<style>
:root {
  --bg: #10110f;
  --card: #191d1b;
  --surface-2: #232924;
  --hover: #2d352f;
  --ink: #f3f0e8;
  --muted: #aeb8b0;
  --line: #343d37;
  --line-2: #4b574f;
  --accent: #66c8bc;
  --accent-d: #a6e0d8;
  --accent-soft: rgba(102,200,188,.14);
  --accent-soft-line: rgba(102,200,188,.38);
  --wood: #d2a15f;
  --steel: #83b7d9;
  --earth: #91a36a;
  --warn: #e0a84f;
  --danger: #ff6f66;
  --danger-soft: rgba(255,111,102,.15);
  --danger-line: rgba(255,111,102,.38);
  --good: #4cc568;
  --radius: 14px;
  --shadow: 0 18px 58px rgba(0,0,0,.38);
  color-scheme: dark;
  font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
}

* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; background: var(--bg); color: var(--ink); }
/* Blød baggrund bag den centrerede app-kolonne */
body { background: linear-gradient(180deg, #1b1d18 0%, #111310 44%, #0c0d0c 100%); }

/* Diskrete mørke scrollbars */
* { scrollbar-width: thin; scrollbar-color: #39424f transparent; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: #39424f; border-radius: 6px; border: 2px solid transparent; background-clip: content-box; }
*::-webkit-scrollbar-thumb:hover { background: #4a5563; background-clip: content-box; }

#app { display: flex; flex-direction: column; min-height: 100vh; width: 100%; max-width: 1440px; margin: 0 auto; padding: 0 18px 8px; }

/* ---- Header ---- */
#hd {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; padding: 12px 20px; background: var(--card);
  border-bottom: 1px solid var(--line); flex-wrap: wrap;
}
.brand strong { font-size: 17px; }
.brand .sub { margin-left: 8px; color: var(--muted); font-size: 13px; }

.filebar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.name-inp { font: inherit; padding: 4px 8px; background: var(--surface-2); color: var(--ink); border: 1px solid var(--line-2); border-radius: 8px; font-size: 13px; width: 150px; }
.name-inp:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
.lang { display: flex; align-items: center; gap: 6px; }
.lang-l { color: var(--muted); font-size: 12px; }
.lang-b, .tab, .utog-b, .btn-sm {
  font: inherit; cursor: pointer; border: 1px solid var(--line);
  background: var(--surface-2); color: var(--ink); border-radius: 8px; padding: 4px 10px; font-size: 13px;
}
.lang-b:hover, .utog-b:hover, .btn-sm:hover { background: var(--hover); }
.lang-b.on { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ---- Tab bar ---- */
#tabbar { display: flex; gap: 6px; padding: 10px 20px 0; flex-wrap: wrap; }
.tab { padding: 8px 16px; border-radius: 10px 10px 0 0; border-bottom: none; }
.tab:hover { background: var(--hover); }
.tab.on { background: var(--card); color: var(--accent); font-weight: 600; box-shadow: var(--shadow); }

/* ---- Content ---- */
#content {
  flex: 1; margin: 0 20px 16px; padding: 20px 22px; background: var(--card);
  border-radius: 0 var(--radius) var(--radius) var(--radius); box-shadow: var(--shadow);
  border: 1px solid var(--line);
}
#content h2 { margin: 0 0 4px; font-size: 19px; }
#content h3 { margin: 0 0 8px; font-size: 14px; color: var(--accent-d); }
.intro { margin: 0 0 16px; color: var(--muted); font-size: 13.5px; max-width: 56ch; }

.twocol { display: grid; grid-template-columns: minmax(260px, 320px) 1fr; gap: 24px; align-items: start; }
@media (max-width: 720px) { .twocol { grid-template-columns: 1fr; } }

/* ---- Inputs ---- */
.panel { display: flex; flex-direction: column; gap: 12px; }
.fld { display: flex; flex-direction: column; gap: 3px; font-size: 13px; }
.fld-l { color: var(--muted); font-size: 12px; font-weight: 600; }
.fld-h { color: var(--muted); font-size: 11px; }
.fld input, .panel select {
  font: inherit; padding: 6px 8px; background: var(--surface-2); color: var(--ink); border: 1px solid var(--line-2); border-radius: 8px; font-size: 14px; width: 100%;
}
.fld input:focus, .panel select:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
/* Smalle talfelter i analyse-faner (ikke abnormt brede) */
.panel .fld input[type=number] { width: 120px; max-width: 120px; }
/* Kort top-indstillinger: smalle talfelter */
.site-settings .fld.inline input[type=number] { width: 78px; flex: 0 0 auto; }

.unit-row { display: flex; gap: 14px; flex-wrap: wrap; padding-bottom: 8px; border-bottom: 1px dashed var(--line); }
.utog { display: flex; align-items: center; gap: 6px; }
.utog-l { color: var(--muted); font-size: 11px; }
.utog-bs { display: inline-flex; }
.utog-b { border-radius: 0; padding: 3px 9px; }
.utog-b:first-child { border-radius: 7px 0 0 7px; }
.utog-b:last-child { border-radius: 0 7px 7px 0; border-left: none; }
.utog-b.on { background: var(--accent); color: #fff; border-color: var(--accent); }

/* ---- Material control ---- */
.mat-block { display: flex; flex-direction: column; gap: 4px; }
.matctl-row { display: flex; gap: 6px; align-items: center; margin-top: 4px; }
.matctl-row select { flex: 1; }
.btn-sm { padding: 4px 9px; font-size: 12px; }
.btn-sm.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-sm.primary:hover { background: var(--accent-d); }
.btn-sm.danger { background: var(--danger-soft); color: var(--danger); border-color: var(--danger-line); }
/* ---- Results ---- */
.results { background: var(--accent-soft); border: 1px solid var(--accent-soft-line); border-radius: var(--radius); padding: 14px 16px; max-width: 340px; }
.res { display: flex; justify-content: space-between; gap: 12px; padding: 4px 0; border-bottom: 1px solid var(--line); font-size: 13.5px; }
.res:last-child { border-bottom: none; }
.res-l { color: var(--muted); }
.res-v { font-weight: 600; font-variant-numeric: tabular-nums; }
.res.big .res-v { font-size: 18px; color: var(--danger); }
.res-note { margin-top: 8px; font-size: 11px; line-height: 1.45; color: var(--muted); }

/* ---- Chart ---- */
.charthost { margin-top: 16px; }
.chart-title { font-size: 13px; font-weight: 600; color: var(--accent-d); margin-bottom: 4px; }
.chart { width: 100%; max-width: 460px; height: auto; background: #141c27; border: 1px solid var(--line); border-radius: 10px; }
.legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; font-size: 12px; color: var(--muted); }
.leg-item { display: inline-flex; align-items: center; gap: 5px; }
.leg-sw { width: 14px; height: 3px; border-radius: 2px; display: inline-block; }

/* ---- Site map editor ---- */
.site-settings { display: flex; flex-wrap: wrap; gap: 14px 20px; align-items: flex-end; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px dashed var(--line); }
.fld.inline { flex-direction: row; align-items: center; gap: 8px; }
.fld.inline .fld-l { margin: 0; }

.map-wrap { display: flex; gap: 12px; align-items: flex-start; }
.toolpalette { display: flex; flex-direction: column; gap: 6px; flex: 0 0 96px; }
.toolbtn { display: flex; align-items: center; gap: 7px; padding: 7px 9px; border: 1px solid var(--line); background: var(--surface-2); color: var(--ink); border-radius: 9px; cursor: pointer; font: inherit; font-size: 12.5px; text-align: left; }
.toolbtn:hover { background: var(--hover); }
.toolbtn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.toolbtn-i { font-size: 15px; width: 18px; text-align: center; }
.zoombar { display: flex; gap: 4px; margin-top: 6px; }
.zoombar .btn-sm { flex: 1; text-align: center; font-size: 15px; padding: 2px 0; }

.map { flex: 1; min-width: 0; max-width: 500px; aspect-ratio: 520 / 440; display: block; background: #131c28; border: 1px solid var(--line); border-radius: 10px; touch-action: none; cursor: crosshair; overflow: hidden; }
.map svg { display: block; width: 100%; height: 100%; }
.map-help { margin-top: 8px; font-size: 12px; color: var(--muted); background: var(--surface-2); border: 1px solid var(--line); border-radius: 8px; padding: 7px 10px; }

.sel-hint { color: var(--muted); font-size: 12.5px; line-height: 1.5; }
.conntable-area { margin-top: 16px; }
.conntable-area h3 { margin: 0 0 8px; font-size: 14px; color: var(--accent-d); }
/* Tabeller som højre kolonne ved siden af kortet */
.conntable-area.side { flex: 0 0 460px; min-width: 0; align-self: stretch; margin-top: 0; max-height: 560px; overflow: auto; }
.conntable-area.side h3 { font-size: 13px; }
@media (max-width: 760px) { .conntable-area.side { flex: 1 1 100%; max-height: none; } }
.conntab.full { font-size: 13px; }
.conntab.full td, .conntab.full th { padding: 5px 8px; vertical-align: middle; }
.conntab.full .editc { padding: 3px 6px; }
.conntab.full td.numc { font-variant-numeric: tabular-nums; white-space: nowrap; }
.conntab.full select, .conntab.full input[type=number] { width: 100%; min-width: 64px; font: inherit; font-size: 13px; padding: 4px 6px; background: var(--surface-2); color: var(--ink); border: 1px solid var(--line-2); border-radius: 6px; }
.conntab.full input[type=number] { max-width: 100px; }
.conntab.full select:focus, .conntab.full input:focus { outline: 2px solid var(--accent); border-color: var(--accent); }

/* Kompakt (dense) variant */
.conntab.full.dense { font-size: 11.5px; }
.conntab.full.dense th { font-size: 10px; padding: 2px 5px; }
.conntab.full.dense td { padding: 1px 5px; }
.conntab.full.dense td.conn-name { width: 46px; min-width: 46px; white-space: nowrap; line-height: 1; }
.conntab.full.dense .conn-name-text { display: inline-block; vertical-align: middle; white-space: nowrap; }
.conntab.full.dense .conn-name .cdot { margin-right: 4px; }
.conntab.full.dense .editc { padding: 1px 3px; }
.conntab.full.dense select, .conntab.full.dense input[type=number] { font-size: 11.5px; padding: 2px 3px; border-radius: 5px; }
.conntab.full.dense input[type=number] { width: 56px; min-width: 0; max-width: 64px; }
.conntab.full.dense select { width: 100%; min-width: 98px; max-width: 130px; }
.posts-h { margin-top: 12px !important; }
.posts-tab { max-width: 380px; }
.pdot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; background: #b6986a; border: 1px solid #6b4f2a; vertical-align: middle; margin-right: 4px; }
.adot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; background: #8fa3c9; vertical-align: middle; margin-right: 4px; }
.persons-tab { max-width: 320px; }
.conntab { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 4px; }
.conntab th { text-align: left; color: var(--muted); font-weight: 600; font-size: 10.5px; padding: 3px 4px; border-bottom: 1px solid var(--line); }
.conntab td { padding: 4px 4px; border-bottom: 1px solid var(--line); }
.crow { cursor: pointer; }
.crow:hover { background: var(--hover); }
.crow.on { background: var(--accent-soft); }
.crow.crit { background: var(--danger-soft); }
.crow.crit td { color: var(--danger); }
.cdot { display: inline-block; width: 10px; height: 10px; border-radius: 2px; vertical-align: middle; margin-right: 3px; }
.encnote { font-size: 11px; color: var(--muted); line-height: 1.4; margin: 6px 0 10px; }

/* ---- 3D view ---- */
.view3d-host { position: relative; width: 100%; max-width: 900px; aspect-ratio: 16 / 10; background: #131c28; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
.view3d-status { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px; color: var(--muted); font-size: 13px; text-align: center; padding: 16px; }
.view3d-hint { margin-top: 8px; font-size: 12px; color: var(--muted); }

/* ---- Materials list + cut list ---- */
.mat-list { width: 100%; max-width: 640px; border-collapse: collapse; font-size: 13.5px; }
.mat-list td { padding: 6px 8px; border-bottom: 1px solid var(--line); }
.mat-list td.q { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; color: var(--ink); font-weight: 600; }
.mat-list tr.sub td { padding-top: 1px; padding-bottom: 6px; border-bottom: 1px solid var(--line); font-size: 11.5px; color: var(--muted); }
.mat-list tr.sub td:first-child { padding-left: 24px; }
.mat-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 8px; vertical-align: baseline; box-shadow: 0 0 0 1px rgba(255,255,255,.14); }
.mat-note { margin: 8px 0 4px; font-size: 11.5px; color: var(--muted); line-height: 1.45; max-width: 640px; }
.cut-h { margin-top: 22px; }
.cutlist { max-width: 720px; }
.cl-grp { margin-bottom: 14px; padding: 10px 12px 8px; border: 1px solid var(--line); border-left: 4px solid var(--accent); border-radius: 8px; background: var(--surface-2); }
.cl-grp-h { display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; margin-bottom: 4px; }
.cl-grp-h b { font-size: 13px; color: var(--ink); display: inline-flex; align-items: center; }
.cl-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 7px; box-shadow: 0 0 0 1px rgba(255,255,255,.14); }
.cl-stock { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.cl-stock-inp { width: 72px; font: inherit; font-size: 13px; padding: 3px 6px; background: var(--bg); color: var(--ink); border: 1px solid var(--line-2); border-radius: 6px; }
.cl-stock-inp:focus { outline: 2px solid var(--accent); border-color: var(--accent); }
.cl-warn { font-size: 12px; color: var(--danger); margin-top: 4px; }
.cl-bar { display: flex; height: 26px; margin: 6px 0 2px; border: 1px solid var(--line-2); border-radius: 5px; overflow: hidden; background: var(--bg); }
.cl-seg { display: flex; align-items: center; justify-content: center; gap: 5px; color: #fff; font-size: 11px; font-weight: 600; overflow: hidden; white-space: nowrap; border-right: 1px solid rgba(255,255,255,.5); }
.cl-seg-lbl { font-weight: 700; opacity: .85; font-size: 10px; padding: 0 3px; border-radius: 3px; background: rgba(0,0,0,.28); }
.cl-waste { display: flex; align-items: center; justify-content: center; background: repeating-linear-gradient(45deg, #232a34, #232a34 5px, #1a2029 5px, #1a2029 10px); color: var(--muted); font-size: 11px; }
.cl-list { font-size: 11.5px; color: var(--muted); margin-bottom: 2px; }

.classic-link { color: var(--accent); font-weight: 600; text-decoration: none; }
.classic-link:hover { text-decoration: underline; }

/* ---- Refreshed layout pass ---- */
#hd {
  margin: 14px 20px 0;
  border: 1px solid rgba(166,224,216,.16);
  border-radius: 18px;
  background: linear-gradient(135deg, rgba(32,37,32,.94), rgba(21,26,24,.96));
  box-shadow: 0 12px 44px rgba(0,0,0,.28);
}
.brand { display: flex; align-items: baseline; gap: 10px; min-width: 220px; }
.brand strong { font-size: 18px; letter-spacing: 0; }
.brand .sub { margin-left: 0; color: var(--wood); font-weight: 600; }
.filebar { margin-left: auto; padding: 3px; background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.06); border-radius: 12px; }
.name-inp { width: 170px; border-radius: 10px; background: rgba(16,17,15,.72); }
.lang { padding: 3px; background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.06); border-radius: 12px; }
.lang-l { padding-left: 4px; }
.lang-b, .tab, .utog-b, .btn-sm { border-color: rgba(166,224,216,.16); }
.lang-b.on, .utog-b.on, .btn-sm.primary {
  background: linear-gradient(180deg, #76d6ca, #42b8aa);
  color: #08100f;
  border-color: rgba(166,224,216,.72);
  font-weight: 700;
}

#tabbar {
  gap: 4px;
  margin: 12px 20px 0;
  padding: 5px;
  width: auto;
  background: rgba(10,12,11,.48);
  border: 1px solid rgba(166,224,216,.11);
  border-radius: 14px;
}
/* Hver gruppe = en lille søjle: sektions-overskrift ØVERST, fane-række under */
.tab-group {
  display: inline-flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 3px;
  min-width: 0;
}
.tab-row { display: inline-flex; align-items: center; gap: 4px; }
.tab-group-labeled {
  margin-left: 10px;
  padding-left: 12px;
  border-left: 1px solid rgba(166,224,216,.14);
}
/* Første gruppe: ingen indledende skillelinje */
.tab-group-labeled:first-child { margin-left: 0; padding-left: 0; border-left: none; }
/* Overskriften skal IKKE ligne en fane: lille, dæmpet, ikke-klikbar caption */
.tab-group-label {
  padding: 0 6px;
  color: var(--muted);
  font-size: 9.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .14em;
  white-space: nowrap;
  opacity: .75;
  pointer-events: none;
  user-select: none;
}
.tab {
  border: 1px solid rgba(166,224,216,.18);
  border-radius: 10px;
  background: rgba(255,255,255,.05);
  color: var(--muted);
  padding: 7px 15px;
  font-weight: 600;
}
.tab:hover { background: rgba(255,255,255,.1); color: var(--ink); border-color: rgba(166,224,216,.34); }
.tab.on {
  background: linear-gradient(180deg, rgba(102,200,188,.26), rgba(102,200,188,.13));
  color: var(--accent-d);
  border-color: rgba(166,224,216,.45);
  box-shadow: inset 0 0 0 1px rgba(166,224,216,.22), 0 1px 4px rgba(0,0,0,.25);
}

#content {
  margin: 10px 20px 18px;
  padding: 22px;
  border-radius: 20px;
  background: linear-gradient(180deg, rgba(25,29,27,.98), rgba(18,22,20,.98));
  border-color: rgba(166,224,216,.14);
}
#content h2 { font-size: 22px; letter-spacing: 0; }
#content h3 { color: var(--accent-d); }
.intro { color: #c7cec7; line-height: 1.45; }
.page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; margin-bottom: 14px; }
.page-head .intro { margin-bottom: 0; }

.twocol.analysis-layout { grid-template-columns: minmax(300px, 380px) minmax(0, 1fr); gap: 20px; align-items: stretch; }
.panel {
  padding: 15px;
  background: rgba(255,255,255,.035);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px;
}
.fld input, .panel select {
  background: rgba(16,17,15,.70);
  border-color: rgba(174,184,176,.25);
}
.unit-row { gap: 12px; border-bottom-color: rgba(166,224,216,.14); }

.analysis-output { display: grid; grid-template-columns: repeat(2, minmax(320px, 1fr)); gap: 16px; align-items: stretch; min-width: 0; }
.analysis-output-bar { display: grid; grid-template-columns: 1fr; }
.analysis-top { display: grid; grid-template-columns: repeat(2, minmax(320px, 1fr)); gap: 16px; align-items: stretch; }
.chart-grid { display: grid; grid-template-columns: repeat(2, minmax(300px, 1fr)); gap: 16px; align-items: stretch; }
.analysis-card { height: 100%; min-height: 292px; }
.analysis-output .charthost {
  min-width: 0;
  margin-top: 0;
  padding: 12px;
  background: rgba(255,255,255,.028);
  border: 1px solid rgba(255,255,255,.065);
  border-radius: 14px;
  display: flex;
  flex-direction: column;
}
.analysis-output .chart { max-width: none; background: #111713; border-color: rgba(166,224,216,.13); flex: 1 1 auto; }
.analysis-output-bar > .legend {
  margin: 0;
  padding: 8px 12px;
  background: rgba(255,255,255,.026);
  border: 1px solid rgba(255,255,255,.06);
  border-radius: 12px;
}

.results {
  position: relative;
  overflow: hidden;
  max-width: none;
  padding: 16px;
  background: linear-gradient(180deg, rgba(102,200,188,.13), rgba(255,255,255,.035));
  border-color: rgba(166,224,216,.28);
}
.results::before { content: ""; position: absolute; inset: 0 0 auto; height: 3px; background: var(--accent); }
.result-ok::before { background: var(--good); }
.result-warn::before { background: var(--warn); }

<body>
<div id="app">
  <header id="hd"></header>
  <nav id="tabbar"></nav>
  <main id="content"></main>
  <footer id="ft"></footer>
</div>
<script>
// ===== src/core/constants.js =====
// Faste fysiske konstanter og standardantagelser for hele appen.
// ENHEDER: alt internt i SI — meter (m), Newton (N), Pascal (Pa).
// Tværsnitsdimensioner angives i millimeter (mm) i datamodellen og
// konverteres til m inde i sections.js.

const G = 9.81;          // tyngdeacceleration (m/s²)

// Materialeantagelser (kan overstyres pr. element via member-objektet)
const E_WOOD = 10e9;     // E-modul, trykimpr. fyr C24 (Pa) — pælens egen bøjning
const K_SOIL = 20e6;     // vandret reaktionsmodul, medium/fast jord (N/m³)

// Forbindelsernes indspænding i Kee-fittings:
// 0 = frit oplagt, 1 = helt fast indspændt. 0,25 = anslået for klemfittings.
const FIXITY = 0.25;

// Standard-geometri (kan overstyres pr. stolpe)
const POST = 0.125;      // standard stolpe 12,5×12,5 cm (m)
const POST_ABOVE = 3.0;  // standard stolpehøjde over jord (m)

// Fundament-zoner
const GRAVEL_H = 0.10;   // småsten i bunden af hullet (m)
// Tjære-zone: hele den nedgravede del + 20 cm over jord — samme zone som
// print-vejledningen instruerer ("fra ca. 20 cm over jord til bunden").
// Bunden er stolpens egen nedgravningsdybde (pr. stolpe), derfor ingen fast konstant.
const TAR_TOP = 0.20;    // tjære til 20 cm over jord (m)

// Skæreplan
const STOCK = 6.0;       // standard stanglængde ved indkøb (m)
const KERF = 0.004;      // savsnit pr. snit (m)

// ===== src/core/units.js =====
// Enhedskonvertering og visning.
//
// PRINCIP: modellen gemmer ALT i kanoniske enheder — længder i meter,
// tværsnit i millimeter. Tommer/fod er udelukkende et VISNINGS- og
// INPUT-anliggende, der håndteres her i kanten. Selve regnekernen
// (sections/mechanics/foundation) ser aldrig en enhed.

const MM_PER_IN = 25.4;   // eksakt
const M_PER_FT = 0.3048;  // eksakt

// ---- Længde: meter (intern) ↔ visningsenhed 'm' | 'ft' ----
const lenToSI   = (v, unit) => unit === 'ft' ? v * M_PER_FT : v;   // → m
const lenFromSI = (v, unit) => unit === 'ft' ? v / M_PER_FT : v;   // m →

// ---- Tværsnit: millimeter (intern) ↔ visningsenhed 'mm' | 'in' ----
const dimToMM   = (v, unit) => unit === 'in' ? v * MM_PER_IN : v;  // → mm
const dimFromMM = (v, unit) => unit === 'in' ? v / MM_PER_IN : v;  // mm →

// ---- Formattering (dansk komma som decimaltegn) ----
function fmt(v, digits = 2, lang = 'da') {
  const s = Number(v).toFixed(digits);
  return lang === 'da' ? s.replace('.', ',') : s;
}

// Tværsnit med enhed, fx "33 mm" / "1,33″"
function fmtDim(mm, unit = 'mm', lang = 'da', digits = unit === 'in' ? 2 : 0) {
  return fmt(dimFromMM(mm, unit), digits, lang) + (unit === 'in' ? '″' : ' mm');
}

// ---- Masse/last: kilogram (intern) ↔ visningsenhed 'kg' | 'lb' ----
const LB_PER_KG = 2.2046226218;
const massFromSI = (kg, unit) => unit === 'lb' ? kg * LB_PER_KG : kg;  // kg →
const massToSI = (v, unit) => unit === 'lb' ? v / LB_PER_KG : v;       // → kg
function fmtMass(kg, unit = 'kg', lang = 'da') {
  return unit === 'lb' ? fmt(kg * LB_PER_KG, 0, lang) + ' lbs' : fmt(kg, 0, lang) + ' kg';
}

// Lille forskydning (nedbøjning/sving) vist i valgt tværsnitsenhed: mm eller tommer.
function fmtDispl(mm, unit = 'mm', lang = 'da') {
  return unit === 'in'
    ? fmt(mm / MM_PER_IN, 2, lang) + '″'
    : fmt(mm, mm < 10 ? 2 : 1, lang) + ' mm';
}

// ===== src/core/sections.js =====
// Tværsnitsegenskaber: inertimoment I (m⁴), modstandsmoment Z (m³),
// areal A (m²). Bruges af både stolpe-, bar-, kort- og materialeberegninger.
//
// Et "section"-objekt beskriver geometrien (dimensioner i MILLIMETER):
//   { kind:'pipe', od, wall }   hult cirkulært rør (ydre-Ø og godstykkelse)
//   { kind:'wood', side }       massivt kvadratisk træ (sidemål)

function sectionProps(section) {
  if (section.kind === 'wood') {
    const b = section.side / 1000;            // mm → m
    return { I: b ** 4 / 12, Z: b ** 3 / 6, A: b * b };
  }
  // 'pipe' — hult cirkulært tværsnit
  const Do = section.od / 1000;               // ydre diameter (m)
  const Di = Math.max(0, section.od - 2 * section.wall) / 1000; // indre diameter (m)
  const I = Math.PI / 64 * (Do ** 4 - Di ** 4);
  const Z = I / (Do / 2);
  const A = Math.PI / 4 * (Do ** 2 - Di ** 2);
  return { I, Z, A };
}

// ===== src/core/mechanics.js =====
// Bjælkemekanik: en vandret bar med en punktlast på midten.
//
// Forenklet håndberegning (ikke FEA):
//   nedbøjning   frit oplagt   δ = W·L³ / (48·E·I)
//                fast indspændt δ = W·L³ / (192·E·I)
//   realistisk = interpolation mellem de to via 'fixity' (0..1)
//   max moment  frit  M = W·L/4 ,  fast M = W·L/8  → samme interpolation
//   bæreevne    M = c·W·L = Z·σ   ⇒   W = Z·σ / (c·L)
//
// 'member' = geometri + materiale (dim i mm, E/sRe/sRm i Pa):
//   { kind:'pipe', od, wall, E, sRe, sRm } | { kind:'wood', side, E, sRe, sRm }
//   sRe = arbejds-/flydegrænse, sRm = brud-/maksgrænse.


function beam(L, member, loadKg, fixity = FIXITY) {
  const { I, Z } = sectionProps(member);
  const E = member.E;
  const W = loadKg * G;                       // last på midten (N)

  const dPin = (W * L ** 3) / (48 * E * I);
  const dFix = (W * L ** 3) / (192 * E * I);
  const dReal = fixity * dFix + (1 - fixity) * dPin;

  const cReal = fixity * (1 / 8) + (1 - fixity) * (1 / 4); // momentkoeff. på W·L
  const pYield = (member.sRe * Z) / (cReal * L) / G;       // kg ved arbejds-/flydegrænse
  const pUlt   = (member.sRm * Z) / (cReal * L) / G;       // kg ved brud

  return { I, Z, dPin, dFix, dReal, cReal, pYield, pUlt, kind: member.kind };
}

// ===== src/core/foundation.js =====
// Pæl-/fundamentstivhed ved en vandret last i toppen af en stolpe.
//
// To bidrag til toppens sideflytning:
//   1) pælens EGEN bøjning som en udkraget bjælke:  δ = H·h³ / (3·E·I_pæl)
//   2) fundamentets DREJNING i jorden:              δ = (H·h/Kθ)·h
// hvor drejestivheden Kθ har to dele:
//     a) passivt jordtryk på betonklodsens SIDER langs dybden: k·b·D³/3
//        (dybden tæller mest — vokser med D³)
//     b) lodret basetryk UNDER betonklodsen:                   k·b⁴/12
//        (klodsens bredde tæller — vokser med b⁴; vigtig for brede/lave klodser)
//   Kθ = k·(b·D³/3 + b⁴/12).  Bredere/dybere betonklods ⇒ stivere fundament.
//
// Alle længder i meter. Parametriseret, så hver enkelt stolpe kan have
// egne mål (sidemål, dybde, hul, højde) — den gamle udgave hardcodede
// 12,5 cm-stolpen.
//
//   postSide   stolpens sidemål (m)        — fx 0.125
//   depth      nedgravningsdybde (m)
//   hole       betonhullets sidemål (m)
//   topHeight  højde til øverste bar = momentarm (m)
//   Ipost      pælens inertimoment (m⁴), valgfri — fx for rør-stolper.
//              Hvis udeladt antages massiv kvadrat: postSide⁴/12.
//   E          pælens E-modul (Pa)         — default E_WOOD
//   kSoil      jordens reaktionsmodul      — default K_SOIL
//   refKg      reference vandret last (kg) — default 50


function foundation({ postSide, depth, hole, topHeight, Ipost,
                             E = E_WOOD, kSoil = K_SOIL, refKg = 50 }) {
  const Ktheta = kSoil * (hole * depth ** 3 / 3      // siderne langs dybden (∝ b·D³)
                        + hole ** 4 / 12);           // basetryk under klodsen (∝ b⁴)
  const Href = refKg * G;                            // N
  const Iw = Ipost != null ? Ipost : postSide ** 4 / 12;  // pælens inertimoment (m⁴)

  const dBend = Href * topHeight ** 3 / (3 * E * Iw);        // pælens egen bøjning (m)
  const dRot  = (Href * topHeight / Ktheta) * topHeight;     // top-flyt pga. drejning (m)
  const dTop  = dBend + dRot;                                // samlet (m)
  const kLat  = Href / dTop;                                 // samlet sidestivhed (N/m)

  return { Ktheta, dBend, dRot, dTop, kLat };
}

// ===== src/core/cutplan.js =====
// Skæreplan: pak en liste af stykker ned i hele stænger med mindst muligt spild.
// First-Fit-Decreasing (FFD) bin-packing. Stanglængde og savsnit (kerf) er
// parametre, så materialelisten kan bruge brugerens egne indkøbslængder.
//
//   pieces : [{ len, label }]   stykkets længde (m) + en kort etiket
//   stock  : hel stanglængde (m)
//   kerf   : savsnit pr. snit (m) — lægges til hvert stykkes plads
//
// Returnerer { bars:[{ used, waste, pieces }], count }.


function packPieces(pieces, stock = STOCK, kerf = KERF) {
  const sorted = pieces.slice().sort((a, b) => b.len - a.len); // største først
  const bars = [];

  for (const p of sorted) {
    let bar = bars.find(b => b.used + p.len + kerf <= stock + 1e-9);
    if (!bar) { bar = { used: 0, pieces: [] }; bars.push(bar); }
    bar.used += p.len + kerf;     // inkl. savsnit
    bar.pieces.push(p);
  }

  for (const b of bars) {
    const sum = b.pieces.reduce((s, p) => s + p.len, 0);
    // resterende materiale (savsnit indregnet i 'used'); et overlangt stykke
    // (len > stock) må ikke give negativ rest i visningen — UI'et advarer separat
    b.waste = Math.max(0, stock - sum);
  }

  return { bars, count: bars.length };
}

// ===== src/core/materials.js =====
// Standard-materialekatalog. Dette er "kimen" til brugerens materialebibliotek
// og svarer 1:1 til den oprindelige SIZES-liste.
//
// Materialer refereres ved stabilt 'id' (ikke ved listeindeks som før), så
// rækkefølgen kan ændres uden at ødelægge gemte tegninger.
//
// Dimensioner i mm; E, sRe, sRm i Pa.
//   sRe = arbejds-/flydegrænse · sRm = brud-/maksgrænse
// Stål: EN 10255 S195T. Træ: C24 fyr.

const CATALOG = [
  { id: 'pipe-3-4', name: '3/4" rør',   kind: 'pipe', od: 26.9, wall: 2.6, E: 210e9, sRe: 195e6, sRm: 320e6 },
  { id: 'pipe-1',   name: '1" rør',     kind: 'pipe', od: 33.7, wall: 3.2, E: 210e9, sRe: 195e6, sRm: 320e6 },
  { id: 'pipe-1-4', name: '1 1/4" rør', kind: 'pipe', od: 42.4, wall: 3.2, E: 210e9, sRe: 195e6, sRm: 320e6 },
  { id: 'wood-10',  name: '10×10 træ', kind: 'wood', side: 100,           E: 10e9,  sRe: 10e6,  sRm: 24e6  },
  { id: 'wood-125', name: '12,5×12,5 træ', kind: 'wood', side: 125,       E: 10e9,  sRe: 10e6,  sRm: 24e6  },
  { id: 'wood-15',  name: '15×15 træ',     kind: 'wood', side: 150,       E: 10e9,  sRe: 10e6,  sRm: 24e6  },
];

// Slå et katalog-/bibliotekselement op på id.
function findMaterial(id, library = CATALOG) {
  return library.find(m => m.id === id) || null;
}

// Fornuftig sortering: rør først (efter ydre-Ø), derefter træ (efter sidemål) — stigende.
function sortLibrary(lib) {
  const dim = m => (m.kind === 'wood' ? m.side : m.od) || 0;
  return lib.slice().sort((a, b) => (a.kind === b.kind ? dim(a) - dim(b) : (a.kind === 'pipe' ? -1 : 1)));
}

// Semantisk farve: rør = blå, træ = brun (tykkelse viser dimension, rød = kritisk).
function materialColor(m) {
  return m && m.kind === 'wood' ? '#a06a32' : '#0b66c3';
}

// Nuancer af materialefarven til at adskille nabostykker i skærelisten —
// holder sig på samme kulør (blå rør / brun træ) i stedet for regnbue.
function segShades(m) {
  return m && m.kind === 'wood'
    ? ['#a06a32', '#c2924f', '#7d5125', '#b5803f', '#8a5b28']
    : ['#0b66c3', '#2f8fde', '#094f99', '#4aa3e8', '#1d7ad1'];
}

// ---- Materialeoptælling: indkøbs- og skæreliste udledt af tegningen ----
// Ren kerne-funktion (ingen DOM) — bruges af Materialer-fanen og Print, og
// testes i tests/tests.js. Bruger de delte hjælpere i model.js, så stiger og
// armgange faktureres ud fra SAMME geometri som Kort og 3D viser.
function computeMaterials(design) {
  const connMat = ref => connMatOf(design, ref);
  const spanOf = c => spanOfConn(design, c);

  const depth = (design.defaults.post && design.defaults.post.depth_m) || 1.2;
  const hole = ((design.defaults.post && design.defaults.post.hole_mm) || 200) / 1000;
  // pr. stolpe-mål (som på Kort) — falder tilbage til standarderne
  const postHeightOf = p => postHeightOfD(design, p);
  const postDepthOf = p => postDepthOfD(design, p);
  const postHoleM = p => postHoleMmOf(design, p) / 1000;
  const postMat = resolveMaterial(design, design.defaults.post.materialId);
  const postSide = (postMat.side || postMat.od || 125) / 1000;
  const postCount = design.posts.length;
  const connLbl = c => connLabelOf(design, c);

  // bar-grupper (perimeter) til tabellen, pr. materiale
  const barGroups = {};   // id -> { mat, totalLen, count }
  design.connections.forEach(c => {
    const span = spanOf(c); if (span <= 0) return;
    const mat = connMat(c.material);
    const g = barGroups[mat.id] = barGroups[mat.id] || { mat, totalLen: 0, count: 0 };
    g.totalLen += span; g.count++;
  });

  // skære-stykker pr. materiale: stolper + barer/overliggere (rør OG træ) + stige-rør
  const cut = {};         // id -> { mat, pieces:[{len,label}] }
  const addCut = (mat, len, label) => { if (!mat || len <= 0) return; (cut[mat.id] = cut[mat.id] || { mat, pieces: [] }).pieces.push({ len, label }); };
  // stolper (lodrette) — hver: egen højde over jord + egen nedgravning (fra Kort)
  let postTotalLen = 0, buriedTotal = 0;
  design.posts.forEach((p, i) => { const lenP = postHeightOf(p) + postDepthOf(p); postTotalLen += lenP; buriedTotal += postDepthOf(p); addCut(postMat, lenP, letterFor(i)); });
  // barer / overliggere
  design.connections.forEach(c => addCut(connMat(c.material), spanOf(c), connLbl(c)));

  // stiger — bar-valget deles med Kort/3D/Print (model.js), så alle fire faner
  // fakturerer den SAMME bar (før valgte materialelisten altid den højeste).
  // ladderMat kan være null (intet rør-bibliotek) — addCut no-opper stille når mat er null,
  // så stige-/armgangs-tællere (ladVert, ladRungCount osv.) opgøres stadig, men uden skæreliste-stykker.
  const ladderMat = design.library.find(m => m.id === 'pipe-1') || design.library.find(m => m.kind === 'pipe') || null;
  let ladVert = 0, ladRungLen = 0, ladRungCount = 0, ladKee = 0, ladderCount = 0;
  design.attachments.forEach(at => {
    if (at.type !== 'ladder') return;
    ladderCount++;
    const lbl = ladderLabelOf(design, at);
    const bar = ladderBarOf(design, at);
    const barY = Math.max(0, bar ? bar.height : (design.site.connHeight_m || 2.2));
    const width = Math.max(0.05, at.width_m || 0.5);
    const vert = barY + 0.5;
    const rc = Math.max(0, Math.floor((barY - 0.25) / 0.40));
    ladVert += vert; ladRungCount += rc; ladRungLen += rc * width; ladKee += 1 + rc * 2;
    addCut(ladderMat, vert, lbl);
    for (let k = 0; k < rc; k++) addCut(ladderMat, width, lbl + 't' + (k + 1));
  });

  // armgange (monkey bars): 1"-trin mellem to barer + 2 beslag pr. trin.
  // Trin skæres i deres FAKTISKE længde (varierer ved roteret samling), og
  // ikke-parallelle barer kræver justerbare kryds-beslag i stedet for faste
  // kryds-klemmer (crossover).
  let monRungCount = 0, monRungLen = 0, monKee = 0, monSwivel = 0, monkeyCount = 0;
  design.attachments.forEach(at => {
    if (at.type !== 'monkey') return;
    const g = monkeyGeometry(design, at.connA, at.connB, at.spacing_m);
    if (!g || !g.rungs.length) return;
    monkeyCount++;
    const lbl = monkeyLabelOf(design, at);
    monRungCount += g.count;
    g.rungs.forEach((r, k) => { monRungLen += r.len; addCut(ladderMat, r.len, lbl + 'g' + (k + 1)); });
    if (g.angled) monSwivel += g.count * 2; else monKee += g.count * 2;
  });

  // fundament — pr. stolpe (egen dybde + hul fra Kort)
  const footVol = 0.22 * 0.22 * 0.5;
  let concVol = 0, gravelVol = 0, tarArea = 0;
  design.posts.forEach(p => {
    const dP = postDepthOf(p), hP = postHoleM(p);
    concVol += (hP * hP - postSide * postSide) * Math.max(0, dP - GRAVEL_H);
    gravelVol += hP * hP * GRAVEL_H;
    // tjære-zone = hele den nedgravede del + TAR_TOP over jord (matcher print.step3)
    tarArea += 4 * postSide * (TAR_TOP + dP) + postSide * postSide;
  });
  concVol += footVol * ladderCount;
  gravelVol += 0.22 * 0.22 * GRAVEL_H * ladderCount;
  const bags25 = Math.ceil(concVol / 0.0125);
  const tarLitre = tarArea * 0.35;
  const pipeConnCount = design.connections.filter(c => connMat(c.material).kind === 'pipe').length;

  return {
    postMat, postCount, postTotalLen, buriedTotal, depth, postSide, hole,
    barGroups, cut, pipeConnCount,
    ladderCount, ladVert, ladRungLen, ladRungCount, ladKee,
    monkeyCount, monRungCount, monRungLen, monKee, monSwivel,
    concVol, gravelVol, bags25, tarLitre,
  };
}

// ===== src/core/model.js =====
// Datamodellen: ét JSON-serialiserbart "design"-objekt er sandheden.
// Indeholder settings/units/library/analysis samt sted-modellen (posts,
// connections, attachments, stock) og de delte, rene opslags-hjælpere.


const SCHEMA_VERSION = 1;

function defaultDesign() {
  return {
    schemaVersion: SCHEMA_VERSION,
    meta: { name: 'Min rig', created: Date.now(), modified: Date.now() },
    settings: { lang: 'da' },
    // Enheder uafhængigt pr. fane:
    units: {
      post: { len: 'm', dim: 'mm' },
      bar:  { len: 'm', dim: 'mm', mass: 'kg' },
      site: { len: 'm' },
    },
    // Materialebibliotek (kim = standardkataloget; brugeren kan tilføje egne):
    library: CATALOG.map(m => ({ ...m, builtin: true })),
    // Selvstændige analyse-faner:
    analysis: {
      post: { materialId: 'wood-125', depth_m: 1.2, hole_mm: 200, height_m: 2.7 },
      bar:  { materialId: 'pipe-1', span_m: 2.4, load_kg: 120, fixity: 0.25 },
    },
    // Sted-model (kort-editoren):
    posts: [],
    connections: [],
    attachments: [],
    stock: {},
    // Kort-editorens indstillinger:
    site: {
      grid_m: 0.125,          // gitter-opløsning (default = stolpetykkelse 12,5 cm)
      connMaterialId: 'pipe-1',
      connHeight_m: 2.0,
      postHeight_m: 3.0,  // standard stolpehøjde over jord (for nye stolper)
      avatarHeight_m: 1.80,  // standard personhøjde (for nye avatarer)
      ladderWidth_m: 0.5,
      refLoad_kg: 120,    // designlast pr. bar (til kritisk-markering på kortet)
      pipeWall_mm: 3.2,   // antaget rør-godstykkelse for ALLE rør (alm. galv. vandrør, EN10255 medium)
      monkeySpacing_m: 0.33,  // trinafstand for armgang (monkey bars)
      soil: 'normal',     // jordtype: 'soft' | 'normal' | 'firm' — skalerer fundamentstivheden
    },
    defaults: {
      post: { materialId: 'wood-125', depth_m: 1.2, hole_mm: 200, height_m: 3.0 },
      soil: {},
      load: { centerKg: 120, fixity: 0.25 },
    },
  };
}

// Slå et materiale op i designets bibliotek (falder tilbage til første).
function resolveMaterial(design, id) {
  return design.library.find(m => m.id === id) || design.library[0];
}

// ---- Delte visnings-/opslags-hjælpere for stolper og forbindelser ----
// Ren, side-effekt-fri logik der ellers var duplikeret i Kort/3D/Materialer/Print.

// Bogstav-label for stolpe nr. i (0-indekseret): A, B, C … Z, derefter '#'+n.
function letterFor(i) { return i < 26 ? String.fromCharCode(65 + i) : '#' + (i + 1); }

// Bogstavet for en given stolpe-id (via dens indeks i design.posts); '?' hvis ukendt.
function postLetterOf(design, id) {
  const i = design.posts.findIndex(p => p.id === id);
  return i < 0 ? '?' : letterFor(i);
}

// Label for en forbindelse: de to stolpe-bogstaver, sorteret og bindestregs-adskilt.
function connLabelOf(design, c) {
  return [postLetterOf(design, c.a), postLetterOf(design, c.b)].sort().join('–');
}

// Labels for attachments: armgange hedder M1, M2 … og stiger S1, S2 …
// (indeks blandt attachments af samme type, i deres rækkefølge i designet).
function attachmentLabelOf(design, at, type, prefix) {
  const list = design.attachments.filter(a => a.type === type);
  const i = list.findIndex(a => a.id === at.id);
  return i < 0 ? prefix + '?' : prefix + (i + 1);
}
function monkeyLabelOf(design, at) { return attachmentLabelOf(design, at, 'monkey', 'M'); }
function ladderLabelOf(design, at) { return attachmentLabelOf(design, at, 'ladder', 'S'); }

// Slå forbindelsens materiale op (ref kan være {source:'library', id} eller en ren id).
function connMatOf(design, ref) {
  const id = ref && ref.source === 'library' ? ref.id : ref;
  return design.library.find(m => m.id === id) || design.library[0];
}

// Stolpens højde over jord, dybde og hul/betonklods (mm) — egne værdier pr.
// stolpe, ellers design-standarderne.
function postHeightOfD(design, p) {
  return p.height_m != null ? p.height_m : (design.site.postHeight_m || 3.0);
}
function postDepthOfD(design, p) {
  return p.depth_m != null ? p.depth_m : ((design.defaults.post && design.defaults.post.depth_m) || 1.2);
}
function postHoleMmOf(design, p) {
  return p.hole_mm != null ? p.hole_mm : ((design.defaults.post && design.defaults.post.hole_mm) || 200);
}

// Spændvidden (m) for en forbindelse ud fra dens to stolpers positioner; 0 hvis ukendt.
function spanOfConn(design, c) {
  const a = design.posts.find(p => p.id === c.a), b = design.posts.find(p => p.id === c.b);
  return (a && b) ? Math.hypot(b.x_m - a.x_m, b.z_m - a.z_m) : 0;
}

// Hvilken vandret bar binder en stige sig til? Den forbindelse på stolpen, hvis
// retning bedst matcher stigens vinkel (uden vinkel: den højeste bar).
// Delt af Kort, 3D, Materialer og Print, så alle fire viser SAMME stige.
function ladderBarOf(design, at) {
  const byId = Object.fromEntries(design.posts.map(p => [p.id, p]));
  const conns = design.connections.filter(c => c.a === at.postId || c.b === at.postId);
  const p = byId[at.postId]; if (!conns.length || !p) return null;
  const dirTo = c => { const o = byId[c.a === at.postId ? c.b : c.a]; return o ? Math.atan2(o.z_m - p.z_m, o.x_m - p.x_m) : 0; };
  let best = conns[0];
  if (at.angle_rad == null) { for (const c of conns) if (c.height_m > best.height_m) best = c; }
  else {
    let bd = Infinity;
    for (const c of conns) {
      const d = dirTo(c);
      const diff = Math.abs(((d - at.angle_rad + Math.PI) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI) - Math.PI);
      if (diff < bd) { bd = diff; best = c; }
    }
  }
  const a = dirTo(best);
  return { conn: best, height: best.height_m, dx: Math.cos(a), dz: Math.sin(a) };
}

// Effektiv (bærende) spændvidde: en stige der binder til baren virker som et
// ekstra støttepunkt — det længste ustøttede stykke styrer styrke/nedbøjning.
function effSpanOfConn(design, c) {
  const span = spanOfConn(design, c);
  let relief = 0;
  for (const at of design.attachments) {
    if (at.type !== 'ladder') continue;
    const bar = ladderBarOf(design, at);
    if (bar && bar.conn && bar.conn.id === c.id) relief = Math.max(relief, Math.max(0.05, at.width_m || 0.5));
  }
  return relief > 0 ? Math.max(0.05, Math.max(relief, span - relief)) : span;
}

// Udadgående retning til en stolpes label (væk fra de nærmeste stolpers
// tyngdepunkt) — delt af Kort og 3D, så labels lander samme sted.
function postLabelDirOf(design, p, idx) {
  const posts = design.posts || [];
  if (!posts.length) return { x: 1, z: 0 };   // ingen stolper: undgå division med nul/NaN
  const nearest = posts
    .slice()
    .sort((a, b) => Math.hypot(a.x_m - p.x_m, a.z_m - p.z_m) - Math.hypot(b.x_m - p.x_m, b.z_m - p.z_m))
    .slice(0, Math.min(4, posts.length));
  const centroid = pts => pts.reduce((s, q) => ({ x: s.x + q.x_m, z: s.z + q.z_m }), { x: 0, z: 0 });
  let c = nearest.length ? centroid(nearest) : { x: 0, z: 0 };
  if (nearest.length) { c.x /= nearest.length; c.z /= nearest.length; }
  let dx = p.x_m - c.x, dz = p.z_m - c.z;
  if (Math.hypot(dx, dz) < 1e-6 && posts.length > 1) {
    c = centroid(posts); c.x /= posts.length; c.z /= posts.length;
    dx = p.x_m - c.x; dz = p.z_m - c.z;
  }
  if (Math.hypot(dx, dz) < 1e-6) {
    const a = (idx / Math.max(1, posts.length)) * Math.PI * 2 - Math.PI / 2;
    dx = Math.cos(a); dz = Math.sin(a);
  }
  const d = Math.hypot(dx, dz) || 1;
  return { x: dx / d, z: dz / d };
}

// Jordtype → faktor på fundamentets jordstivhed (K_SOIL). Groft, men nok til
// at "blød stolpe"-flaget reagerer på pladsens forhold.
const SOIL_FACTORS = { soft: 0.45, normal: 1.0, firm: 1.7 };
function soilFactorOf(design) {
  return SOIL_FACTORS[(design.site && design.site.soil) || 'normal'] || 1.0;
}

// ---- Armgang (monkey bars): trin mellem to nogenlunde parallelle barer ----
// Ren geometri, delt af Kort, 3D og Materialer. Returnerer null hvis
// geometrien slet ikke kan beregnes; ellers trin + nøgletal, så kalderen selv
// kan afgøre hvor strengt der skal valideres (placering er strengere end visning).
function monkeyGeometry(design, connA, connB, spacing_m) {
  const byId = Object.fromEntries(design.posts.map(p => [p.id, p]));
  const ca = design.connections.find(c => c.id === connA);
  const cb = design.connections.find(c => c.id === connB);
  if (!ca || !cb || ca.id === cb.id) return null;
  const a1 = byId[ca.a], a2 = byId[ca.b], b1 = byId[cb.a], b2 = byId[cb.b];
  if (!a1 || !a2 || !b1 || !b2) return null;
  let ux = a2.x_m - a1.x_m, uz = a2.z_m - a1.z_m;
  const La = Math.hypot(ux, uz); if (La < 0.15) return null;
  ux /= La; uz /= La;
  const vxr = b2.x_m - b1.x_m, vzr = b2.z_m - b1.z_m;
  const Lb = Math.hypot(vxr, vzr); if (Lb < 0.15) return null;
  const vx = vxr / Lb, vz = vzr / Lb;
  const cross = Math.abs(ux * vz - uz * vx);      // 0 = parallelle
  if (cross > 0.45) return null;                  // > ~27° kan ikke tegnes fornuftigt
  // projicér bar B's endepunkter på bar A's retning (origo = a1)
  const proj = q => (q.x_m - a1.x_m) * ux + (q.z_m - a1.z_m) * uz;
  const tb1 = proj(b1), tb2 = proj(b2);
  const start = Math.max(0, Math.min(tb1, tb2)), end = Math.min(La, Math.max(tb1, tb2));
  if (end - start < 0.15) return null;            // (næsten) intet overlap
  // vinkelret afstand (= trinlængde) målt midt i overlappet
  const nearestOnB = (x, z) => {
    const t = ((x - b1.x_m) * vx + (z - b1.z_m) * vz);
    return { x: b1.x_m + vx * t, z: b1.z_m + vz * t };
  };
  const tm = (start + end) / 2;
  const pmx = a1.x_m + ux * tm, pmz = a1.z_m + uz * tm;
  const qm = nearestOnB(pmx, pmz);
  const gap = Math.hypot(qm.x - pmx, qm.z - pmz);
  if (gap < 0.05 || gap > 2.5) return null;
  const sp = Math.max(0.15, spacing_m || (design.site && design.site.monkeySpacing_m) || 0.33);
  const margin = 0.12;                            // luft til beslag i enderne
  const usable = end - start - 2 * margin;
  const n = usable >= 0 ? Math.floor(usable / sp) + 1 : 1;
  const off = start + (end - start - (n - 1) * sp) / 2;
  const rungs = [];
  for (let k = 0; k < n; k++) {
    const t = off + k * sp;
    const ax = a1.x_m + ux * t, az = a1.z_m + uz * t;
    // fodpunktet på bar B — trinnet skal HÆFTE på selve baren (ikke dens
    // forlængelse), ellers tegnes/faktureres trin ud i den blå luft, når en
    // stolpe trækkes og barerne ikke længere er parallelle
    const tb = (ax - b1.x_m) * vx + (az - b1.z_m) * vz;
    if (tb < margin - 1e-9 || tb > Lb - margin + 1e-9) continue;
    const bx = b1.x_m + vx * tb, bz = b1.z_m + vz * tb;
    rungs.push({ ax, az, bx, bz, len: Math.hypot(bx - ax, bz - az) });
  }
  if (!rungs.length) return null;
  const lens = rungs.map(r => r.len);
  const hdiff = Math.abs((ca.height_m || 0) - (cb.height_m || 0));
  return {
    ca, cb, rungs, count: rungs.length, rungLen: gap, gap, cross, hdiff,
    lenMin: Math.min(...lens), lenMax: Math.max(...lens),
    // roteret samling: barerne er ikke parallelle (> ~2°) — kan konstrueres
    // med DREJELIGE beslag; trinlængderne varierer, og materialelisten skal
    // fakturere svingbare koblinger i stedet for faste klemmer
    angled: cross > 0.035,
    overlap: end - start,
    mid: { x: (pmx + qm.x) / 2, z: (pmz + qm.z) / 2 },
    y: Math.min(ca.height_m || 0, cb.height_m || 0),   // grebshøjde = laveste bar
  };
}

// Streng gyldighed til PLACERING (visning er mere tolerant, så en placeret
// armgang ikke forsvinder bare fordi en stolpe flyttes lidt).
// Ikke-parallelle barer er TILLADT (op til geometriens ~27°) — de kræver
// blot drejelige beslag (g.angled); men hvert trin skal være i grebs-venlig
// længde, og barerne skal sidde i nogenlunde samme højde.
function monkeyPlacementValid(g) {
  return !!g && g.lenMin >= 0.25 && g.lenMax <= 1.6
    && g.overlap >= 0.4 && g.hdiff <= 0.3;
}

// Kan et bar-par overhovedet BÆRE en armgang (til placering/par-vælger)?
// Som monkeyPlacementValid men UDEN højdekravet: en højdeforskel blokerer
// ikke — den udlignes automatisk ved placering (begge barer sættes til den
// lavestes højde, samme regel som H-feltet i skemaet).
function monkeyPairPlaceable(g) {
  return !!g && g.lenMin >= 0.25 && g.lenMax <= 1.6 && g.overlap >= 0.4;
}

// Udlign de to barers højde til den laveste (bruges når en armgang placeres
// eller flyttes til et par med højdeforskel — trinnene skal hæfte i samme kote).
function alignMonkeyBars(design, connA, connB) {
  const ca = design.connections.find(c => c.id === connA);
  const cb = design.connections.find(c => c.id === connB);
  if (!ca || !cb) return;
  if (Math.abs((ca.height_m || 0) - (cb.height_m || 0)) <= 0.3) return;
  const h = Math.min(ca.height_m || 0, cb.height_m || 0);
  ca.height_m = h; cb.height_m = h;
}

// Armgangens maksimale grebshøjde: trinnene hæfter i BEGGE barer, så højden
// er begrænset af den laveste af de fire bærende stolper (begge barers ender).
// null hvis armgangens barer/stolper ikke kan slås op.
function monkeyMaxHeight(design, at) {
  const ca = design.connections.find(c => c.id === at.connA);
  const cb = design.connections.find(c => c.id === at.connB);
  if (!ca || !cb) return null;
  const hOf = id => {
    const p = design.posts.find(q => q.id === id);
    return p ? postHeightOfD(design, p) : null;
  };
  const hs = [ca.a, ca.b, cb.a, cb.b].map(hOf);
  if (hs.some(h => h == null)) return null;
  return Math.min(...hs);
}

// ===== src/core/presets.js =====
// Foruddefinerede "forslag"-rigs man kan starte fra. Hver bygger en komplet,
// gyldig tegning oven på defaultDesign() (erstatter posts/connections/attachments).

function presetList() {
  return [
    { id: 'pullup2', nameKey: 'preset.pullup2' },
    { id: 'square4', nameKey: 'preset.square4' },
    { id: 'long6', nameKey: 'preset.long6' },
  ];
}

function buildPreset(id) {
  const d = defaultDesign();
  const pipe = { source: 'library', id: 'pipe-1' };
  const pipeBig = { source: 'library', id: 'pipe-1-4' };
  const post = (pid, x, z) => ({ id: pid, x_m: x, z_m: z, height_m: 2.5, depth_m: 1.0, hole_mm: 200, override: null });
  const conn = (cid, a, b, h, mat) => ({ id: cid, a, b, height_m: h, material: mat || pipe, onTop: false });
  const avatar = (x, z) => ({ id: 'av1', type: 'avatar', x_m: x, z_m: z, height_m: 1.8 });
  const ladder = (postId) => ({ id: 'la1', type: 'ladder', postId, width_m: 0.5, angle_rad: 0 });

  if (id === 'pullup2') {
    // Simpelt pull-up-stativ: to stolper + én overligger.
    d.posts = [post('p1', 0, 0), post('p2', 1.6, 0)];
    d.connections = [conn('c1', 'p1', 'p2', 2.4)];
    d.attachments = [avatar(0.8, 0.6)];
  } else if (id === 'square4') {
    // Firkant-rig: fire stolper, overliggere hele vejen rundt, dyp-bar lavt + stige.
    d.posts = [post('p1', 0, 0), post('p2', 2.4, 0), post('p3', 2.4, 1.6), post('p4', 0, 1.6)];
    d.connections = [
      conn('c1', 'p1', 'p2', 2.4),
      conn('c2', 'p2', 'p3', 2.0),
      conn('c3', 'p4', 'p3', 2.4, pipeBig),
      conn('c4', 'p1', 'p4', 1.3),
    ];
    d.attachments = [ladder('p1'), avatar(1.2, 0.8)];
  } else if (id === 'long6') {
    // Lang rig: to fag i en række med ARMGANG (monkey bars) mellem de to
    // langsgående skinner (0,8 m fra hinanden = realistisk trinlængde) + stige.
    d.posts = [
      post('p1', 0, 0), post('p2', 2.0, 0), post('p3', 4.0, 0),
      post('p4', 0, 0.8), post('p5', 2.0, 0.8), post('p6', 4.0, 0.8),
    ];
    d.connections = [
      conn('c1', 'p1', 'p2', 2.4, pipeBig), conn('c2', 'p2', 'p3', 2.4, pipeBig),
      conn('c3', 'p4', 'p5', 2.4, pipeBig), conn('c4', 'p5', 'p6', 2.4, pipeBig),
      conn('c5', 'p1', 'p4', 2.0), conn('c6', 'p2', 'p5', 2.0), conn('c7', 'p3', 'p6', 2.0),
    ];
    d.attachments = [
      { id: 'mb1', type: 'monkey', connA: 'c1', connB: 'c3', spacing_m: 0.33 },
      { id: 'mb2', type: 'monkey', connA: 'c2', connB: 'c4', spacing_m: 0.33 },
      ladder('p1'), avatar(2.0, -0.6),
    ];
  }
  return d;
}

// ===== src/core/schema.js =====
// Serialisering, validering, versionsmigrering og import af det gamle format.
// Det er rygraden i at kunne gemme/dele tegninger sikkert over tid.


// Nøgle den OPRINDELIGE app gemte under (fast firkant-parametre).
const LEGACY_KEY = 'chalestetics-3d';
// Gammel SIZES-rækkefølge → nye biblioteks-id'er.
const LEGACY_SIZE_IDS = ['pipe-3-4', 'pipe-1', 'pipe-1-4', 'wood-10'];

const num = (v, dflt) => (typeof v === 'number' && isFinite(v)) ? v : dflt;
const atLeast = (v, min, dflt) => Math.max(min, num(v, dflt));

function serialize(design) {
  return JSON.stringify(design, null, 2);
}

function deserialize(text) {
  let raw;
  try { raw = JSON.parse(text); } catch (e) { throw new Error('invalid-json'); }
  return adopt(raw);
}

// Tag et rå-objekt (fra fil eller localStorage) og gør det til et gyldigt design.
function adopt(raw) {
  if (!raw || typeof raw !== 'object') throw new Error('not-a-design');
  // Gammelt format fra den oprindelige app?
  if (raw.schemaVersion == null && (raw.lenLong != null || raw.sideSizes != null)) {
    return fromLegacy(raw);
  }
  const migrated = migrate(raw);
  if (!validate(migrated)) throw new Error('invalid-design');
  return migrated;
}

function migrate(raw) {
  const v = raw.schemaVersion || 0;
  if (v > SCHEMA_VERSION) throw new Error('newer-schema'); // afvis nyere filer pænt
  // Fremtidige trin indsættes her, fx:  if (raw.schemaVersion === 1) raw = up1to2(raw);
  return fill(raw);
}

// Er et bibliotekselement brugbart? Objekt med id + gyldig kind + positive
// dimensioner og materialedata — ellers giver fallback-opslag NaN i alle beregninger.
function usableMaterial(m) {
  if (!m || typeof m !== 'object' || !m.id) return false;
  if (!(m.E > 0 && m.sRe > 0 && m.sRm > 0)) return false;
  if (m.kind === 'wood') return m.side > 0;
  if (m.kind === 'pipe') return m.od > 0;
  return false;
}

// Flet et (muligvis ufuldstændigt) design ind i en frisk default, så alle felter findes.
function fill(d) {
  const base = defaultDesign();
  const u = d.units || {};
  const isObj = x => !!x && typeof x === 'object' && !Array.isArray(x);
  const objArr = a => (Array.isArray(a) ? a.filter(isObj) : []);
  const lib = objArr(d.library).filter(usableMaterial);
  const merged = {
    ...base, ...d,
    schemaVersion: SCHEMA_VERSION,
    meta: { ...base.meta, ...(isObj(d.meta) ? d.meta : {}) },
    settings: { ...base.settings, ...(isObj(d.settings) ? d.settings : {}) },
    units: {
      post: { ...base.units.post, ...(isObj(u.post) ? u.post : {}) },
      bar: { ...base.units.bar, ...(isObj(u.bar) ? u.bar : {}) },
      site: { ...base.units.site, ...(isObj(u.site) ? u.site : {}) },
    },
    library: lib.length ? lib : base.library,
    analysis: {
      post: { ...base.analysis.post, ...(isObj((d.analysis || {}).post) ? d.analysis.post : {}) },
      bar: { ...base.analysis.bar, ...(isObj((d.analysis || {}).bar) ? d.analysis.bar : {}) },
    },
    posts: objArr(d.posts),
    connections: objArr(d.connections),
    attachments: objArr(d.attachments),
    stock: isObj(d.stock) ? d.stock : {},
    defaults: {
      ...base.defaults, ...(isObj(d.defaults) ? d.defaults : {}),
      post: { ...base.defaults.post, ...(isObj((d.defaults || {}).post) ? d.defaults.post : {}) },
    },
    site: { ...base.site, ...(isObj(d.site) ? d.site : {}) },
  };
  // Opgradér den gamle hul-standard (30 cm) til den nye (20 cm). Bemærk: en
  // legacy-import kan have sat feltet fra brugerens gamle valg (0,3 m var
  // legacy-default) — default og bevidst valg kan ikke skelnes, så vi
  // accepterer at et bevidst 30 cm-valg også opgraderes.
  if (merged.defaults.post.hole_mm === 300) merged.defaults.post.hole_mm = base.defaults.post.hole_mm;
  merged.library = mergeCatalog(merged.library);
  merged.analysis.post.depth_m = atLeast(merged.analysis.post.depth_m, 0, base.analysis.post.depth_m);
  merged.analysis.post.hole_mm = atLeast(merged.analysis.post.hole_mm, 0, base.analysis.post.hole_mm);
  merged.analysis.post.height_m = atLeast(merged.analysis.post.height_m, 0, base.analysis.post.height_m);
  merged.analysis.bar.span_m = atLeast(merged.analysis.bar.span_m, 0.1, base.analysis.bar.span_m);
  merged.analysis.bar.load_kg = atLeast(merged.analysis.bar.load_kg, 0, base.analysis.bar.load_kg);
  merged.analysis.bar.fixity = Math.min(1, atLeast(merged.analysis.bar.fixity, 0, base.analysis.bar.fixity));
  merged.site.grid_m = atLeast(merged.site.grid_m, 0.01, base.site.grid_m);
  merged.site.connHeight_m = atLeast(merged.site.connHeight_m, 0, base.site.connHeight_m);
  merged.site.postHeight_m = atLeast(merged.site.postHeight_m, 0.1, base.site.postHeight_m);
  merged.site.avatarHeight_m = atLeast(merged.site.avatarHeight_m, 0.3, base.site.avatarHeight_m);
  merged.site.ladderWidth_m = atLeast(merged.site.ladderWidth_m, 0.05, base.site.ladderWidth_m);
  merged.site.refLoad_kg = atLeast(merged.site.refLoad_kg, 0, base.site.refLoad_kg);
  // Global rør-godstykkelse er en RESERVE-antagelse: den udfylder kun rør
  // UDEN eget gods. Katalogets dokumenterede værdier (fx 2,6 mm for 3/4",
  // EN 10255 medium) og brugerens egne rør bevares.
  merged.site.pipeWall_mm = atLeast(merged.site.pipeWall_mm, 0.5, base.site.pipeWall_mm);
  merged.library.forEach(m => { if (m.kind === 'pipe' && !(m.wall > 0)) m.wall = merged.site.pipeWall_mm; });
  merged.site.monkeySpacing_m = atLeast(merged.site.monkeySpacing_m, 0.15, base.site.monkeySpacing_m);
  if (!SOIL_FACTORS[merged.site.soil]) merged.site.soil = base.site.soil;
  // hul/betonklods kan aldrig være mindre end stolpens eget tværsnit
  const pmFill = resolveMaterial(merged, merged.defaults.post.materialId);
  const postSideMmFill = pmFill ? ((pmFill.kind === 'wood' ? pmFill.side : pmFill.od) || 125) : 125;
  merged.defaults.post.hole_mm = Math.max(merged.defaults.post.hole_mm, postSideMmFill);
  const pmAna = resolveMaterial(merged, merged.analysis.post.materialId);
  merged.analysis.post.hole_mm = Math.max(merged.analysis.post.hole_mm,
    pmAna ? ((pmAna.kind === 'wood' ? pmAna.side : pmAna.od) || 125) : 125);
  // stolper: koordinater SKAL være endelige tal — ellers giver spænd/tegning NaN
  merged.posts = merged.posts.filter(p => isFinite(p.x_m) && isFinite(p.z_m) && p.id != null);
  merged.posts.forEach(p => {
    if (p.height_m != null) p.height_m = atLeast(p.height_m, 0.1, merged.site.postHeight_m);
    if (p.depth_m != null) p.depth_m = atLeast(p.depth_m, 0.1, merged.defaults.post.depth_m);
    if (p.hole_mm != null) p.hole_mm = atLeast(p.hole_mm, postSideMmFill, merged.defaults.post.hole_mm);
  });
  // forbindelser skal pege på eksisterende stolper
  const postIds = new Set(merged.posts.map(p => p.id));
  merged.connections = merged.connections.filter(c => postIds.has(c.a) && postIds.has(c.b) && c.id != null);
  merged.connections.forEach(c => { c.height_m = atLeast(c.height_m, 0, merged.site.connHeight_m); });
  // attachments: stiger/personer skal pege på noget der findes
  merged.attachments = merged.attachments.filter(a =>
    a.type !== 'ladder' || postIds.has(a.postId));
  merged.attachments = merged.attachments.filter(a =>
    a.type !== 'avatar' || (isFinite(a.x_m) && isFinite(a.z_m)));
  merged.attachments.forEach(a => {
    if (a.type === 'ladder') a.width_m = atLeast(a.width_m, 0.05, merged.site.ladderWidth_m);
    if (a.type === 'avatar') a.height_m = atLeast(a.height_m, 0.3, merged.site.avatarHeight_m);
    if (a.type === 'monkey') a.spacing_m = atLeast(a.spacing_m, 0.15, merged.site.monkeySpacing_m);
  });
  // armgange der peger på slettede forbindelser er meningsløse — smid dem ud
  merged.attachments = merged.attachments.filter(a => a.type !== 'monkey'
    || (merged.connections.some(c => c.id === a.connA) && merged.connections.some(c => c.id === a.connB)));
  Object.keys(merged.stock || {}).forEach(id => { merged.stock[id] = atLeast(merged.stock[id], 0.5, 0.5); });
  return merged;
}

// Hold de indbyggede materialer i biblioteket opdaterede med kataloget:
// nye materialer tilføjes, navne/mål på indbyggede opdateres, egne bevares.
function mergeCatalog(lib) {
  const out = Array.isArray(lib) ? lib.slice() : [];
  for (const c of CATALOG) {
    const i = out.findIndex(m => m.id === c.id);
    if (i < 0) out.push({ ...c, builtin: true });
    else if (out[i].builtin) out[i] = { ...c, builtin: true };
  }
  return out;
}

function validate(d) {
  return !!d && d.schemaVersion === SCHEMA_VERSION
    && d.settings && (d.settings.lang === 'da' || d.settings.lang === 'en')
    && Array.isArray(d.library) && d.library.length > 0
    && d.analysis && d.analysis.post && d.analysis.bar
    && Array.isArray(d.posts) && Array.isArray(d.connections);
}

// Konvertér den oprindelige apps gemte data (fast firkant) til den nye graf-model.
function fromLegacy(o) {
  const d = defaultDesign();
  const lenLong = atLeast(o.lenLong, 0.1, 2.4), lenShort = atLeast(o.lenShort, 0.1, 1.2);
  const hL = (lenLong + POST) / 2, hS = (lenShort + POST) / 2;
  const corners = [{ x: -hL, z: -hS }, { x: hL, z: -hS }, { x: hL, z: hS }, { x: -hL, z: hS }];
  d.posts = corners.map((c, i) => ({ id: 'p' + (i + 1), x_m: c.x, z_m: c.z, override: null }));

  const sides = [[0, 1], [1, 2], [2, 3], [3, 0]]; // A, B, C, D
  const heights = Array.isArray(o.heights) ? o.heights : [2.7, 2.3, 1.5, 1.0];
  const sizeIdx = Array.isArray(o.sideSizes) ? o.sideSizes : [1, 1, 1, 1];
  d.connections = sides.map((s, i) => ({
    id: 'c' + (i + 1),
    a: 'p' + (s[0] + 1), b: 'p' + (s[1] + 1),
    height_m: atLeast(heights[i], 0, 1.5),
    material: { source: 'library', id: LEGACY_SIZE_IDS[sizeIdx[i]] || 'pipe-1' },
    onTop: atLeast(heights[i], 0, 0) >= POST_ABOVE,
  }));

  d.attachments = [{ id: 'a1', type: 'ladder', postId: 'p1', connectionId: 'c1', width_m: atLeast(o.ladderWidth, 0.05, 0.5) }];
  d.defaults = {
    post: { materialId: 'wood-125', depth_m: atLeast(o.depth, 0, 1.2), hole_mm: atLeast(o.hole, 0, 0.3) * 1000, height_m: POST_ABOVE },
    soil: {},
    load: { centerKg: atLeast(o.load, 0, 120), fixity: 0.25 },
  };
  d.analysis.bar.load_kg = atLeast(o.load, 0, 120);
  d.meta.name = 'Importeret rig';
  return d;
}

// ===== src/core/store.js =====
// Tilstands-container: holder design-objektet, gemmer automatisk i localStorage,
// og fører fortryd/gentag-historikken.


const KEY = 'calisthenics-rig-designer';

let design = loadDesign();
let saveTimer = null;

// Fortryd/gentag: stak af serialiserede tilstande (top = nuværende tilstand).
const HISTORY_MAX = 80;
// Commits tættere på hinanden end dette koalesceres til ÉT fortryd-trin, så
// fx at skrive et navn ikke giver ét trin pr. tastetryk.
const COALESCE_MS = 800;
let undoStack = [JSON.stringify(design)];
let redoStack = [];
let lastCommitAt = 0;

function getDesign() { return design; }

// Kald efter en ændring i design: opdatér historik + gem (debounced).
function commit() {
  design.meta.modified = Date.now();
  const snap = JSON.stringify(design);
  const now = Date.now();
  if (now - lastCommitAt < COALESCE_MS && undoStack.length > 1) {
    undoStack[undoStack.length - 1] = snap;   // samme "skrive-burst" → erstat toppen
  } else {
    undoStack.push(snap);
    if (undoStack.length > HISTORY_MAX) undoStack.shift();
  }
  lastCommitAt = now;
  redoStack = [];
  scheduleSave();
}

// Forsøg at parse + validere/normalisere en stak-post via adopt(). Ved fejl:
// advar og returnér null, så kaldstedet kan afbryde uden at installere et ødelagt design.
function restoreFromStack(entry) {
  try {
    return adopt(JSON.parse(entry));
  } catch (e) {
    console.warn('Fortryd/gentag fejlede (ugyldig tilstand):', e);
    return null;
  }
}

// Gendan forrige tilstand (commit-niveau). Returnerer true hvis der skete noget.
function undo() {
  if (undoStack.length < 2) return false;
  const restored = restoreFromStack(undoStack[undoStack.length - 2]); // forrige tilstand
  if (!restored) return false;
  redoStack.push(undoStack.pop());                       // nuværende → gentag
  design = restored;
  lastCommitAt = 0;                                      // næste commit må ikke koalescere hen over et fortryd
  scheduleSave();
  return true;
}

function redo() {
  if (!redoStack.length) return false;
  const s = redoStack[redoStack.length - 1];
  const restored = restoreFromStack(s);
  if (!restored) return false;
  redoStack.pop();
  undoStack.push(s);
  design = restored;
  lastCommitAt = 0;
  scheduleSave();
  return true;
}

// Bekvem helper: muter design og commit i ét.
function update(mutator) { mutator(design); commit(); }

// Erstat hele designet (fx ved fil-load eller "Ny tegning").
function replace(newDesign) { design = newDesign; commit(); }

function flushSave() {
  clearTimeout(saveTimer);
  saveTimer = null;
  try { localStorage.setItem(KEY, JSON.stringify(design)); } catch (e) { console.warn('Autosave fejlede (localStorage):', e); }
}

function scheduleSave() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(flushSave, 300);
}

// Debounce må ikke koste den sidste ændring, hvis fanen lukkes med det samme.
if (typeof addEventListener === 'function') {
  addEventListener('pagehide', () => { if (saveTimer) flushSave(); });
}

function loadDesign() {
  // 1) nuværende v2-tegning (migreres/udfyldes via adopt)
  try {
    const cur = localStorage.getItem(KEY);
    if (cur) return adopt(JSON.parse(cur));
  } catch (e) {
    // Korrupt/uparsbar tegning: læg en backup-kopi til side FØR næste autosave
    // overskriver den — så data kan reddes manuelt.
    console.warn('Gemt tegning kunne ikke indlæses — backup lagt under "' + KEY + '-corrupt":', e);
    try {
      const cur = localStorage.getItem(KEY);
      if (cur && !localStorage.getItem(KEY + '-corrupt')) localStorage.setItem(KEY + '-corrupt', cur);
    } catch (_) { /* localStorage fuld/utilgængelig — kan ikke reddes */ }
  }
  // 2) importér automatisk fra den oprindelige app, hvis den findes
  try {
    const old = localStorage.getItem(LEGACY_KEY);
    if (old) return adopt(JSON.parse(old));
  } catch (e) { /* ignorér */ }
  return defaultDesign();
}
