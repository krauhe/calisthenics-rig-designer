        const sp = ladderSnap(wx, wz);
        ghostLadder = sp ? { ...sp, width_m: Math.max(design.site.ladderWidth_m, MIN_LADDER_WIDTH_M), down: true, invalid: ladderSlotTaken(sp, null) } : null;
        drag = { mode: 'place-ladder', sux: ux, suy: uy, moved: false };
        try { mapBox.setPointerCapture(e.pointerId); } catch (_) {}
        redraw();
      }
      else if (tool === 'monkey') {
        // start placering: armgangen snapper til nærmeste brugbare bar-par
        const [wx, wz] = toWorld(ux, uy);
        const sp = monkeySnap(wx, wz);
        ghostMonkey = sp ? { ...sp, spacing_m: design.site.monkeySpacing_m, down: true, invalid: monkeySlotTaken(sp, null) } : null;
        help.textContent = sp ? tt('site.help.monkey') : tt('site.monkey.nopair');
        drag = { mode: 'place-monkey', sux: ux, suy: uy, moved: false };
        try { mapBox.setPointerCapture(e.pointerId); } catch (_) {}
        redraw();
      }
    });
    mapBox.addEventListener('pointermove', e => {
      if (e.pointerType === 'touch' && touchPts.has(e.pointerId)) touchPts.set(e.pointerId, evtToUser(e));
      if (!drag) {
        const [ux, uy] = evtToUser(e);
        // forhåndsvisning + justeringslinjer når man placerer en stolpe
        if (tool === 'post') {
          const [wx, wz] = toWorld(ux, uy);
          const al = alignSnap(wx, wz, null);
          guides = { x: al.x, z: al.z, ghost: { x: al.x != null ? al.x : snap(wx), z: al.z != null ? al.z : snap(wz) } };
          redraw();
        } else if (tool === 'ladder') {
          // spøgelses-stige følger musen og snapper til mulige steder
          const [wx, wz] = toWorld(ux, uy);
          const sp = ladderSnap(wx, wz);
          ghostLadder = sp ? { ...sp, width_m: Math.max(design.site.ladderWidth_m, MIN_LADDER_WIDTH_M), down: false, invalid: ladderSlotTaken(sp, null) } : null;
          redraw();
        } else if (tool === 'monkey') {
          // spøgelses-armgang følger musen og snapper til brugbare bar-par;
          // findes der slet ingen, forklarer hjælpelinjen hvorfor
          const [wx, wz] = toWorld(ux, uy);
          const sp = monkeySnap(wx, wz);
          ghostMonkey = sp ? { ...sp, spacing_m: design.site.monkeySpacing_m, down: false, invalid: monkeySlotTaken(sp, null) } : null;
          help.textContent = sp ? tt('site.help.monkey') : tt('site.monkey.nopair');
          redraw();
        } else if (guides || ghostLadder || ghostMonkey) { guides = null; ghostLadder = null; ghostMonkey = null; redraw(); }
        return;
      }
      if (drag.mode === 'pinch') {
        if (touchPts.size < 2) return;
        const [p1, p2] = [...touchPts.values()];
        const d = Math.hypot(p1[0] - p2[0], p1[1] - p2[1]) || 1;
        const mid = [(p1[0] + p2[0]) / 2, (p1[1] + p2[1]) / 2];
        view.k = Math.min(MAX_K, Math.max(MIN_K, drag.k0 * d / drag.d0));
        view.tx = mid[0] - drag.w0[0] * view.k;
        view.ty = mid[1] - drag.w0[1] * view.k;
        redraw(true);
        return;
      }
      const [ux, uy] = evtToUser(e);
      if (Math.hypot(ux - drag.sux, uy - drag.suy) > 3) drag.moved = true;
      if (drag.mode === 'pan') { view.tx = drag.stx + (ux - drag.sux); view.ty = drag.sty + (uy - drag.suy); redraw(true); }
      else if (drag.mode === 'move') {
        if (!drag.moved) return;   // et rent klik må ikke grid-snappe stolpen
        const p = design.posts.find(x => x.id === drag.id); if (!p) return;
        const [wx, wz] = toWorld(ux, uy);
        const al = alignSnap(wx, wz, p.id);
        p.x_m = al.x != null ? al.x : snap(wx);
        p.z_m = al.z != null ? al.z : snap(wz);
        guides = { x: al.x, z: al.z, ghost: null };
        redraw(true);
        if (liveConnUpdate) liveConnUpdate();   // opdatér L + last i skemaet live
      }
      else if (drag.mode === 'place-ladder') {
        const [wx, wz] = toWorld(ux, uy);
        const sp = ladderSnap(wx, wz);
        ghostLadder = sp ? { ...sp, width_m: Math.max(design.site.ladderWidth_m, MIN_LADDER_WIDTH_M), down: true, invalid: ladderSlotTaken(sp, null) } : null;
        redraw(true);
      }
      else if (drag.mode === 'place-monkey') {
        const [wx, wz] = toWorld(ux, uy);
        const sp = monkeySnap(wx, wz);
        ghostMonkey = sp ? { ...sp, spacing_m: design.site.monkeySpacing_m, down: true, invalid: monkeySlotTaken(sp, null) } : null;
        redraw(true);
      }
      else if (drag.mode === 'ladder') {
        if (!drag.moved) return;
        const at = design.attachments.find(a => a.id === drag.id); if (!at) return;
        const [wx, wz] = toWorld(ux, uy);
        const sp = ladderSnap(wx, wz);
        // følg kun med til pladser der ikke allerede er optaget af en anden stige
        if (sp && !ladderSlotTaken(sp, at.id)) { at.postId = sp.postId; at.angle_rad = sp.angle_rad; }
        redraw(true);
      }
      else if (drag.mode === 'monkey') {
        if (!drag.moved) return;
        const at = design.attachments.find(a => a.id === drag.id); if (!at) return;
        const [wx, wz] = toWorld(ux, uy);
        const sp = monkeySnap(wx, wz);
        // følg kun med til bar-par der ikke allerede har en armgang
        if (sp && !monkeySlotTaken(sp, at.id)) { at.connA = sp.connA; at.connB = sp.connB; }
        redraw(true);
      }
      else if (drag.mode === 'avatar') {
        if (!drag.moved) return;
        const at = design.attachments.find(a => a.id === drag.id); if (!at) return;
        const [wx, wz] = toWorld(ux, uy);
        at.x_m = snap(wx); at.z_m = snap(wz);
        redraw(true);
      }
    });
    const endPointer = e => {
      if (e && e.pointerType === 'touch') touchPts.delete(e.pointerId);
      const mode = drag && drag.mode;
      if (mode === 'pinch') {
        if (touchPts.size < 2) { drag = null; down = null; saveView(); redraw(); }
        return;
      }
      // stige-værktøj: placér endeligt der hvor spøgelset snappede fast
      if (mode === 'place-ladder') {
        const sp = ghostLadder;
        // placér KUN hvis pladsen er ledig (ingen dobbelt-stige oven på hinanden)
        if (sp && !sp.invalid) store.update(d => d.attachments.push({ id: nextId(d.attachments, 'a'), type: 'ladder', postId: sp.postId, width_m: Math.max(d.site.ladderWidth_m, MIN_LADDER_WIDTH_M), angle_rad: sp.angle_rad }));
        drag = null; down = null; ghostLadder = null;
        redraw(); renderPanel();
        return;
      }
      // armgangs-værktøj: placér endeligt på det bar-par spøgelset snappede til.
      // Har barerne forskellig højde, udlignes de til den laveste — trinnene
      // skal hæfte i samme kote i begge sider.
      if (mode === 'place-monkey') {
        const sp = ghostMonkey;
        if (sp && !sp.invalid) store.update(d => {
          d.attachments.push({ id: nextId(d.attachments, 'a'), type: 'monkey', connA: sp.connA, connB: sp.connB, spacing_m: d.site.monkeySpacing_m });
          alignMonkeyBars(d, sp.connA, sp.connB);
        });
        drag = null; down = null; ghostMonkey = null;
        redraw(); renderPanel();
        return;
      }
      const wasDrag = drag && drag.moved;
      if (mode === 'pan') saveView();   // husk pan på tværs af refresh
      // en armgang trukket til et par med højdeforskel: udlign før commit
      if (wasDrag && mode === 'monkey') {
        const at = design.attachments.find(a => a.id === drag.id);
        if (at) alignMonkeyBars(design, at.connA, at.connB);
      }
      if (wasDrag && (mode === 'move' || mode === 'ladder' || mode === 'monkey' || mode === 'avatar')) store.commit();
      drag = null; guides = null;
      if (wasDrag) redraw();                              // gentegn med bogstav-labels igen
      if (wasDrag && (mode === 'move' || mode === 'ladder' || mode === 'monkey' || mode === 'avatar')) renderPanel();
      if (!wasDrag && down) handleClick(down.kind, down.id, down.ux, down.uy);
      down = null;
    };
    mapBox.addEventListener('pointerup', endPointer);
    mapBox.addEventListener('pointercancel', endPointer);
    mapBox.addEventListener('pointerleave', () => { if (!drag && (guides || ghostLadder || ghostMonkey)) { guides = null; ghostLadder = null; ghostMonkey = null; redraw(); } });

    function handleClick(kind, id, ux, uy) {
      if (tool === 'post' && (kind === 'bg' || !kind)) {
        const [wx, wz] = toWorld(ux, uy);
        const al = alignSnap(wx, wz, null);
        const fx = al.x != null ? al.x : snap(wx), fz = al.z != null ? al.z : snap(wz);
        store.update(d => d.posts.push({ id: nextId(d.posts, 'p'), x_m: fx, z_m: fz, height_m: d.site.postHeight_m || 3.0, override: null }));
        guides = null; redraw();
      } else if (tool === 'avatar' && (kind === 'bg' || !kind)) {
        const [wx, wz] = toWorld(ux, uy);
        store.update(d => d.attachments.push({ id: nextId(d.attachments, 'a'), type: 'avatar', x_m: snap(wx), z_m: snap(wz), height_m: d.site.avatarHeight_m || 1.8 }));
        redraw(); renderPanel();
      } else if (tool === 'select') {
        selectedPost = kind === 'post' ? id : null;
        selectedConn = kind === 'conn' ? id : null;
        selectedLadder = kind === 'ladder' ? id : null;
        selectedMonkey = kind === 'monkey' ? id : null;
        selectedAvatar = kind === 'avatar' ? id : null;
        redraw(); renderPanel();
      } else if (tool === 'connect' && kind === 'post') {
        if (!connectFrom) { connectFrom = id; }
        else if (connectFrom !== id) {
          const a = connectFrom, b = id;
          const exists = design.connections.some(c => (c.a === a && c.b === b) || (c.a === b && c.b === a));
          if (!exists) store.update(d => d.connections.push({ id: nextId(d.connections, 'c'), a, b, height_m: d.site.connHeight_m, material: { source: 'library', id: d.site.connMaterialId }, onTop: false }));
          connectFrom = null;
        }
        redraw(); renderPanel();
      } else if (tool === 'delete') {
        // armgange der mister en af deres barer skal også væk
        const dropOrphanMonkeys = d => { d.attachments = d.attachments.filter(at => at.type !== 'monkey' || (d.connections.some(c => c.id === at.connA) && d.connections.some(c => c.id === at.connB))); };
        if (kind === 'post') store.update(d => { d.posts = d.posts.filter(p => p.id !== id); d.connections = d.connections.filter(c => c.a !== id && c.b !== id); d.attachments = d.attachments.filter(at => at.postId !== id); dropOrphanMonkeys(d); });
        else if (kind === 'conn') store.update(d => { d.connections = d.connections.filter(c => c.id !== id); d.attachments = d.attachments.filter(at => at.connectionId !== id); dropOrphanMonkeys(d); });
        else if (kind === 'ladder' || kind === 'monkey' || kind === 'avatar') store.update(d => { d.attachments = d.attachments.filter(at => at.id !== id); });
        if (selectedPost && !design.posts.some(p => p.id === selectedPost)) selectedPost = null;
        if (selectedConn && !design.connections.some(c => c.id === selectedConn)) selectedConn = null;
        if (selectedLadder && !design.attachments.some(a => a.id === selectedLadder)) selectedLadder = null;
        if (selectedMonkey && !design.attachments.some(a => a.id === selectedMonkey)) selectedMonkey = null;
        if (selectedAvatar && !design.attachments.some(a => a.id === selectedAvatar)) selectedAvatar = null;
        redraw(); renderPanel();
      }
    }

    mapBox.addEventListener('wheel', e => {
      e.preventDefault();
      const [ux, uy] = evtToUser(e);
      const [wx, wz] = toWorld(ux, uy);
      view.k = Math.min(MAX_K, Math.max(MIN_K, view.k * (e.deltaY < 0 ? 1.12 : 1 / 1.12)));
      view.tx = ux - wx * view.k; view.ty = uy - wz * view.k;
      redraw(); saveView();
    }, { passive: false });

    function fit() {
      if (!design.posts.length) { view = { k: 70, tx: W / 2, ty: H * 0.6 }; redraw(); saveView(); return; }
      const xs = design.posts.map(p => p.x_m), zs = design.posts.map(p => p.z_m);
      const minX = Math.min(...xs), maxX = Math.max(...xs), minZ = Math.min(...zs), maxZ = Math.max(...zs);
      const pad = 0.6;
      const k = Math.min(MAX_K, Math.max(MIN_K, Math.min(W / (maxX - minX + 2 * pad || 1), H / (maxZ - minZ + 2 * pad || 1))));
      view = { k, tx: W / 2 - (minX + maxX) / 2 * k, ty: H / 2 - (minZ + maxZ) / 2 * k };
      redraw(); saveView();
    }

    const palette = el('div', { class: 'toolpalette' },
      ...TOOLS.map(([id, icon, key]) =>
        el('button', { class: 'toolbtn' + (tool === id ? ' on' : ''), type: 'button', title: tt(key), 'data-tool': id,
          onclick: () => { tool = id; connectFrom = null; selectedPost = null; selectedConn = null; selectedLadder = null; selectedMonkey = null; selectedAvatar = null; guides = null; ghostLadder = null; ghostMonkey = null; setHelp();
            palette.querySelectorAll('.toolbtn').forEach(b => b.classList.toggle('on', b.getAttribute('data-tool') === id));
            redraw(); renderPanel(); } },
          el('span', { class: 'toolbtn-i', html: toolIcon(id) }), el('span', { class: 'toolbtn-t' }, tt(key)))),
      el('div', { class: 'zoombar' },
        el('button', { class: 'btn-sm', type: 'button', title: 'zoom +', onclick: () => zoom(1.2) }, '＋'),
        el('button', { class: 'btn-sm', type: 'button', title: 'zoom −', onclick: () => zoom(1 / 1.2) }, '−'),
        el('button', { class: 'btn-sm', type: 'button', title: tt('site.fit'), onclick: fit, html: `<svg width='14' height='14' viewBox='0 0 24 24' style='vertical-align:middle'><path d='M3 8V3h5 M16 3h5v5 M21 16v5h-5 M8 21H3v-5' fill='none' stroke='currentColor' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/></svg>` })),
      el('div', { class: 'zoombar' },
        // rerenderAll: fortryd erstatter design-objektet, så også header (navn/print) skal gentegnes
        el('button', { class: 'btn-sm', type: 'button', title: tt('site.undo') + ' (Ctrl+Z)', onclick: () => { if (store.undo()) ctx.rerenderAll(); } }, '↶'),
        el('button', { class: 'btn-sm', type: 'button', title: tt('site.redo') + ' (Ctrl+Y)', onclick: () => { if (store.redo()) ctx.rerenderAll(); } }, '↷')));

    // Zoom om kortets midte (ikke world-origo), så indholdet bliver i billedet.
    function zoom(f) {
      const [wx, wz] = toWorld(W / 2, H / 2);
      view.k = Math.min(MAX_K, Math.max(MIN_K, view.k * f));
      view.tx = W / 2 - wx * view.k;
      view.ty = H / 2 - wz * view.k;
      redraw(); saveView();
    }

    const gridCm = Math.round((design.site.grid_m || 0.125) * 1000) / 10;
    const gridInp = el('input', { type: 'number', step: '0.5', min: '1', value: String(gridCm), style: 'width:70px' });
    gridInp.addEventListener('input', () => { const v = parseFloat(gridInp.value); if (!isNaN(v)) { store.update(d => { d.site.grid_m = Math.max(v / 100, MIN_SITE_GRID_M); }); redraw(); } });
    gridInp.addEventListener('change', () => { gridInp.value = String(Math.max(parseFloat(gridInp.value) || 0, MIN_SITE_GRID_M * 100)); });

    // Global rør-godstykkelse — RESERVE-antagelse for rør uden eget gods.
    // Katalogets dokumenterede værdier (fx 2,6 mm for 3/4") overskrives ikke.
    const wallInp = el('input', { type: 'number', step: '0.1', min: '0.5', value: String(design.site.pipeWall_mm || 3.2), style: 'width:70px' });
    wallInp.addEventListener('input', () => {
      const v = parseFloat(wallInp.value); if (isNaN(v)) return;
      const w = Math.max(v, 0.5);
      store.update(d => { d.site.pipeWall_mm = w; d.library.forEach(m => { if (m.kind === 'pipe' && !(m.wall > 0)) m.wall = w; }); });
      redraw(); renderPanel();
    });
    wallInp.addEventListener('change', () => { wallInp.value = String(Math.max(parseFloat(wallInp.value) || 0, 0.5)); });

    const settings = el('div', { class: 'site-settings' },
      unitToggle(tt('units.length'), [['m', tt('unit.m')], ['ft', tt('unit.ft')]], su,
        v => { store.update(d => { d.units.site.len = v; }); ctx.rerender(); }),
      el('label', { class: 'fld inline' }, el('span', { class: 'fld-l' }, `${tt('site.grid')} (cm)`), gridInp),
      el('label', { class: 'fld inline' }, el('span', { class: 'fld-l' }, `${tt('site.ladderwidth')} (${suTxt})`),
        lenInput(design.site.ladderWidth_m, su, v => { store.update(d => { d.site.ladderWidth_m = Math.max(v, MIN_LADDER_WIDTH_M); }); redraw(); }, { minSI: MIN_LADDER_WIDTH_M })),
      el('label', { class: 'fld inline', title: tt('site.pipewall.hint') }, el('span', { class: 'fld-l' }, `${tt('site.pipewall')} (mm)`), wallInp),
      el('label', { class: 'fld inline', title: tt('site.refload.hint') }, el('span', { class: 'fld-l' }, `${tt('site.refload')} (kg)`),
        numInput(design.site.refLoad_kg || 120, 5, v => { store.update(d => { d.site.refLoad_kg = Math.max(v, 0); }); redraw(); renderPanel(); }, { min: 0 })),
      el('label', { class: 'fld inline', title: tt('site.soil.hint') }, el('span', { class: 'fld-l' }, tt('site.soil')),
        select([['soft', tt('site.soil.soft')], ['normal', tt('site.soil.normal')], ['firm', tt('site.soil.firm')]],
          design.site.soil || 'normal',
          v => { store.update(d => { d.site.soil = v; }); redraw(); renderPanel(); })));

    // Ctrl+Z / Ctrl+Y (eller Ctrl+Shift+Z) — kun aktiv mens kortet er fremme.
    if (tabSite._keyHandler) document.removeEventListener('keydown', tabSite._keyHandler);
    tabSite._keyHandler = e => {
      if (!mapBox.isConnected) { document.removeEventListener('keydown', tabSite._keyHandler); return; }
      if (/^(INPUT|SELECT|TEXTAREA)$/.test(e.target.tagName || '')) return;
      if (!(e.ctrlKey || e.metaKey)) return;
      const k = e.key.toLowerCase();
      if (k === 'z' && !e.shiftKey) { e.preventDefault(); if (store.undo()) ctx.rerenderAll(); }
      else if (k === 'y' || (k === 'z' && e.shiftKey)) { e.preventDefault(); if (store.redo()) ctx.rerenderAll(); }
    };
    document.addEventListener('keydown', tabSite._keyHandler);

    setHelp();
    redraw();
    renderPanel();
    if (tabSite.fitNext) { tabSite.fitNext = false; fit(); }   // tilpas zoom efter en forslags-rig
    const ladderCount = design.attachments.filter(a => a.type === 'ladder').length;
    const monkeyCount = design.attachments.filter(a => a.type === 'monkey').length;
    const avatarCount = design.attachments.filter(a => a.type === 'avatar').length;
    const countLabel = (n, oneKey, manyKey) => `${n} ${tt(n === 1 ? oneKey : manyKey)}`;
    const summary = el('div', { class: 'site-summary' },
      el('span', { class: 'summary-pill' }, `${design.posts.length} ${tt('site.posts.title')}`),
      el('span', { class: 'summary-pill' }, `${design.connections.length} ${tt('site.conn.tableTitle')}`),
      ...(ladderCount ? [el('span', { class: 'summary-pill' }, countLabel(ladderCount, 'site.summary.ladder.one', 'site.summary.ladder.many'))] : []),
      ...(monkeyCount ? [el('span', { class: 'summary-pill' }, countLabel(monkeyCount, 'site.summary.monkey.one', 'site.summary.monkey.many'))] : []),
      ...(avatarCount ? [el('span', { class: 'summary-pill' }, countLabel(avatarCount, 'site.summary.person.one', 'site.summary.person.many'))] : []));
    container.append(
      el('div', { class: 'page-head site-head' },
        el('div', {},
          el('h2', {}, tt('tab.site')),
          el('p', { class: 'intro' }, tt('site.intro'))),
        summary),
      el('div', { class: 'site-shell' },
        settings,
        el('div', { class: 'map-wrap' }, palette, mapBox, selPanel),
        help));
  },
};

function nextId(list, prefix) {
  let n = 0;
  for (const it of list) { const m = /(\d+)$/.exec(it.id || ''); if (m) n = Math.max(n, +m[1]); }
  return prefix + (n + 1);
}

// ===== src/ui/tabView3d.js =====
// Fane: 3D. Viser dét, der er tegnet på Kort (stolper + forbindelser + stiger)
// i ægte 3D — bygget til at ligne den oprindelige enkelt-fil-app
// (calisthenics-3d.html): halvgennemsigtig jord så fundamentet ses (småsten,
// beton, tjære-zone), Kee-beslag på rørene, og en LODRET stige der binder sig
// til en vandret bar. Three.js hentes som ES-modul — FØRST fra den lokale
// kopi (vendor/three.module.js, virker offline og uafhængigt af CDN),
// dernæst fra unpkg-CDN som reserve (fx for den delte enkelt-fil uden
// vendor-mappen). Lægges på window, så det passer ind i den klassiske
// script-arkitektur. Egen lille bane-styring bruges i stedet for OrbitControls
// (som ville kræve et importmap).

const THREE_CDN = 'https://unpkg.com/three@0.160.0/build/three.module.js';
let _threeP = null;
function ensureThree() {
  if (window.__rigTHREE) return Promise.resolve(window.__rigTHREE);
  if (_threeP) return _threeP;
  // absolut URL relativt til SIDEN (ikke scriptet), så det virker både for
  // index.html, enkelt-filen og GitHub Pages' undermappe
  const local = new URL('vendor/three.module.js', document.baseURI).href;
  _threeP = import(local)
    .catch(() => import(THREE_CDN))
    .then(T => (window.__rigTHREE = T));
  // Fejlet load må ikke caches for evigt — glem promisen, så næste
  // fanebesøg prøver igen (fx når nettet er tilbage).
  _threeP.catch(() => { _threeP = null; });
  return _threeP;
}

const tabView3d = {
  id: 'view3d',
  labelKey: 'tab.view3d',
  render(container, ctx) {
    const { design } = ctx;
    const tt = k => ctx.t(k, ctx.lang);

    container.append(el('h2', {}, tt('tab.view3d')), el('p', { class: 'intro' }, tt('view3d.intro')));

    if (!design.posts.length) {
      container.append(el('div', { class: 'empty-state empty-3d' },
        el('div', { class: 'rig-ghost', 'aria-hidden': 'true' },
          el('span', { class: 'ghost-post ghost-post-a' }),
          el('span', { class: 'ghost-post ghost-post-b' }),
          el('span', { class: 'ghost-post ghost-post-c' }),
          el('span', { class: 'ghost-post ghost-post-d' }),
          el('span', { class: 'ghost-bar ghost-bar-top' }),
          el('span', { class: 'ghost-bar ghost-bar-mid' }),
          el('span', { class: 'ghost-ladder' })),
        el('p', {}, tt('view3d.empty')),
        el('button', { class: 'btn-sm primary', type: 'button', onclick: () => ctx.openTab && ctx.openTab('site') }, tt('tab.site'))));
      return;
    }

    const host = el('div', { class: 'view3d-host' });
    const status = el('div', { class: 'view3d-status' }, tt('view3d.loading'));
    container.append(host, el('p', { class: 'view3d-hint' }, tt('view3d.hint')));
    host.append(status);

    ensureThree()
      // fjern først status når build3d er lykkedes — ellers ender fejlbeskeden
      // i et element der allerede er ude af DOM'en (usynlig fejl)
      .then(THREE => { build3d(THREE, host, design, ctx); status.remove(); })
      .catch(err => {
        console.error('3D-visning fejlede:', err);
        clear(status);
        status.append(
          el('p', {}, tt('view3d.failed')),
          el('p', {}, el('a', { href: 'calisthenics-3d.html', class: 'classic-link' }, tt('view3d.classic'))));
      });
  },
};

function build3d(THREE, host, design, ctx) {
  const V3 = (x, y, z) => new THREE.Vector3(x, y, z);
  const su = (design.units.site && design.units.site.len) || 'm';
  const lang = design.settings.lang;
  const suTxt = su === 'ft' ? ctx.t('unit.ft', lang) : ctx.t('unit.m', lang);

  // ---- faste fundament-mål (zoner fra constants.js — GRAVEL_H/TAR_TOP) ----
  const DEPTH = (design.defaults.post && design.defaults.post.depth_m) || 1.2;
  const HOLE = ((design.defaults.post && design.defaults.post.hole_mm) || 200) / 1000;

  // ---- model-data ----
  const refLoad = design.site.refLoad_kg || 120;
  const cx = design.posts.reduce((s, p) => s + p.x_m, 0) / design.posts.length;
  const cz = design.posts.reduce((s, p) => s + p.z_m, 0) / design.posts.length;
  const byId = Object.fromEntries(design.posts.map(p => [p.id, p]));
  const postLetter = id => postLetterOf(design, id);
  const connLabel = c => connLabelOf(design, c);
  // Stolpe-label ligger fladt på jorden uden for stolpen og er STATISK.
  // Teksten vender UDAD (væk fra centrum), så den læses fra kameraet, der
  // altid ser riggen udefra. (dx,dz) = udadgående retning fra centrum.
  const outwardLabelYawFor = (dx, dz) => Math.atan2(dx, dz);
  const postLabelDir = (p, idx) => postLabelDirOf(design, p, idx);   // delt med Kort (model.js)
  const pm = resolveMaterial(design, design.defaults.post.materialId);
  const POST = ((pm && (pm.side || pm.od)) || 125) / 1000;
  const connMat = ref => connMatOf(design, ref);
  const siteDefH = design.site.postHeight_m || 3.0;
  // pr. stolpe: over-jord-højde = stolpens egen højde (dog mindst en bars
  // overkant, så bjælken ikke svæver over toppen — bar ≤ stolpe via Kort-klamp).
  const aboveOf = {};
  design.posts.forEach(p => { aboveOf[p.id] = (p.height_m != null ? p.height_m : siteDefH); });
  design.connections.forEach(c => {
    if (aboveOf[c.a] != null) aboveOf[c.a] = Math.max(aboveOf[c.a], c.height_m);
    if (aboveOf[c.b] != null) aboveOf[c.b] = Math.max(aboveOf[c.b], c.height_m);
  });
  const maxAbove = Math.max(2.0, ...design.posts.map(p => aboveOf[p.id]));

  // ---- scene + renderer ----
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xdfe6ee);
  const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  host.appendChild(renderer.domElement);
  renderer.domElement.style.display = 'block';
  renderer.domElement.style.width = '100%';
  renderer.domElement.style.height = '100%';

  const camera = new THREE.PerspectiveCamera(50, 1, 0.05, 200);

  // ---- lys ----
  scene.add(new THREE.HemisphereLight(0xffffff, 0x6b7a86, 0.85));
  const sun = new THREE.DirectionalLight(0xfff4e0, 1.1);
  sun.position.set(6, 10, 4); sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  const sb = 7; sun.shadow.camera.left = -sb; sun.shadow.camera.right = sb; sun.shadow.camera.top = sb; sun.shadow.camera.bottom = -sb;
  scene.add(sun);

  // ---- materialer (samme paletter som den oprindelige) ----
  const woodMat = new THREE.MeshStandardMaterial({ color: 0xb6c089, roughness: 0.9 });
  const pipeMat = new THREE.MeshStandardMaterial({ color: 0x2a2d33, roughness: 0.4, metalness: 0.7 });
  const galvMat = new THREE.MeshStandardMaterial({ color: 0xb9c0c6, roughness: 0.35, metalness: 0.85 });
  const tarMat = new THREE.MeshStandardMaterial({ color: 0x14110f, roughness: 0.55 });
  const concMat = new THREE.MeshStandardMaterial({ color: 0x9aa0a6, roughness: 1, transparent: true, opacity: 0.55 });
  const gravelMat = new THREE.MeshStandardMaterial({ color: 0x7d8389, roughness: 1 });
  const critMat = new THREE.MeshStandardMaterial({ color: 0xd0241c, roughness: 0.45, metalness: 0.3 });

  // ---- geometri-hjælpere ----
  function cylBetween(a, b, r, mat) {
    const dir = new THREE.Vector3().subVectors(b, a); const len = dir.length();
    const m = new THREE.Mesh(new THREE.CylinderGeometry(r, r, len, 16), mat);
    m.position.copy(a).addScaledVector(dir, 0.5);
    m.quaternion.setFromUnitVectors(V3(0, 1, 0), dir.clone().normalize());
    m.castShadow = true;
    return m;
  }
  // Kee-beslag (forenklet): rund flange mod stolpen + muffe om røret + sætskrue.
  function makeFitting(r) {
    const g = new THREE.Group();
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.055, 0.055, 0.012, 24), galvMat);
    base.rotation.z = Math.PI / 2; base.position.x = 0.006; base.castShadow = true; g.add(base);
    const sleeve = new THREE.Mesh(new THREE.CylinderGeometry(r * 1.35, r * 1.35, 0.06, 20), galvMat);
    sleeve.rotation.z = Math.PI / 2; sleeve.position.x = 0.045; sleeve.castShadow = true; g.add(sleeve);
    const screw = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.008, r * 1.6, 10), galvMat);
    screw.position.set(0.045, r * 1.5, 0); g.add(screw);
    return g;
  }
  function makeClamp(r) {
    const m = new THREE.Mesh(new THREE.CylinderGeometry(r * 1.5, r * 1.5, 0.05, 16), galvMat);
    m.castShadow = true; return m;
  }
  // fast flad label på jorden (ligger fladt, følger IKKE kameraet).
  // ring/txt = farve; orange = stolper, blå = forbindelser (som på Kort).
  function makeFlatLabel(text, ring, txt, opts = {}) {
    const pill = opts.shape === 'pill';
    const c = document.createElement('canvas'), g = c.getContext('2d');
    c.width = pill ? 256 : 128; c.height = 128;
    g.fillStyle = 'rgba(255,255,255,0.94)';
    if (pill) {
      const x = 14, y = 30, w = 228, h = 68, r = 24;
      g.beginPath();
      g.moveTo(x + r, y);
      g.arcTo(x + w, y, x + w, y + h, r);
      g.arcTo(x + w, y + h, x, y + h, r);
      g.arcTo(x, y + h, x, y, r);
      g.arcTo(x, y, x + w, y, r);
      g.closePath();
      g.fill();
      g.lineWidth = 7; g.strokeStyle = ring; g.stroke();
      g.fillStyle = txt; g.font = 'bold 48px system-ui'; g.textAlign = 'center'; g.textBaseline = 'middle';
      g.fillText(text, 128, 66);
    } else {
      g.beginPath(); g.arc(64, 64, 56, 0, Math.PI * 2); g.fill();
      g.lineWidth = 7; g.strokeStyle = ring; g.stroke();
      g.fillStyle = txt; g.font = `bold ${text.length > 2 ? 50 : 76}px system-ui`; g.textAlign = 'center'; g.textBaseline = 'middle';
      g.fillText(text, 64, 70);
    }
    const wM = pill ? Math.max(0.62, Math.min(0.9, 0.32 + text.length * 0.1)) : 0.42;
    const hM = pill ? 0.28 : 0.42;
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(wM, hM),
      new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false }));
    plane.rotation.x = -Math.PI / 2;
    const grp = new THREE.Group(); grp.add(plane); return grp;
  }
  // svævende højde-label (canvas-sprite, vender mod kameraet)
  function makeLabel(text) {
    const c = document.createElement('canvas'), g = c.getContext('2d');
    c.width = 256; c.height = 72;
    g.fillStyle = 'rgba(11,102,195,0.92)';
    g.beginPath(); const r = 14, w = 248, h = 64, x = 4, y = 4;
    g.moveTo(x + r, y); g.arcTo(x + w, y, x + w, y + h, r); g.arcTo(x + w, y + h, x, y + h, r); g.arcTo(x, y + h, x, y, r); g.arcTo(x, y, x + w, y, r); g.closePath(); g.fill();
    g.fillStyle = '#fff'; g.font = 'bold 38px system-ui'; g.textAlign = 'center'; g.textBaseline = 'middle';
    g.fillText(text, 128, 40);
    const spr = new THREE.Sprite(new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), depthTest: false }));
    spr.scale.set(0.6, 0.17, 1);
    return spr;
  }
  const fmtH = h => `${fmt(lenFromSI(h, su), su === 'ft' ? 1 : 1, lang)} ${suTxt}`;

  const group = new THREE.Group(); scene.add(group);
  let maxR = 1;

  // ---- stolper + fundament ----
  design.posts.forEach((p, pi) => {
    const X = p.x_m - cx, Z = p.z_m - cz;
    const above = aboveOf[p.id];
    const dP = p.depth_m != null ? p.depth_m : DEPTH;          // egen dybde (fra Kort)
    const hP = p.hole_mm != null ? p.hole_mm / 1000 : HOLE;    // eget hul/betonklods
    maxR = Math.max(maxR, Math.hypot(X, Z));
    const total = above + dP;
    const post = new THREE.Mesh(new THREE.BoxGeometry(POST, total, POST), woodMat);
    post.position.set(X, (above - dP) / 2, Z); post.castShadow = true; post.receiveShadow = true; group.add(post);

    const gravel = new THREE.Mesh(new THREE.BoxGeometry(hP, GRAVEL_H, hP), gravelMat);
    gravel.position.set(X, -dP + GRAVEL_H / 2, Z); group.add(gravel);

    const concH = Math.max(0.01, dP - GRAVEL_H);
    const conc = new THREE.Mesh(new THREE.BoxGeometry(hP, concH, hP), concMat);
    conc.position.set(X, -dP + GRAVEL_H + concH / 2, Z); group.add(conc);

    const tarBot = -dP, tarH = TAR_TOP - tarBot;   // tjære: hele den nedgravede del + TAR_TOP over jord
    const tar = new THREE.Mesh(new THREE.BoxGeometry(POST * 1.06, tarH, POST * 1.06), tarMat);
    tar.position.set(X, (tarBot + TAR_TOP) / 2, Z); group.add(tar);
    const tarTop = new THREE.Mesh(new THREE.BoxGeometry(POST * 1.02, 0.02, POST * 1.02), tarMat);
    tarTop.position.set(X, above + 0.01, Z); tarTop.castShadow = true; group.add(tarTop);

    // Stolpe-label: fast gulvmarkering uden for stolpegruppen, med toppen vendt udad.
    const ld = postLabelDir(p, pi);
    const labelGap = Math.max(0.42, POST * 2.8 + 0.16);
    const ox = X + ld.x * labelGap, oz = Z + ld.z * labelGap;
    const pl = makeFlatLabel(letterFor(pi), '#d98324', '#9a3412');
    pl.position.set(ox, 0.035, oz);
    pl.rotation.y = outwardLabelYawFor(ld.x, ld.z);
    group.add(pl);
  });

  // ---- forbindelser (bars) + beslag ----
  design.connections.forEach((c, idx) => {
    const a = byId[c.a], b = byId[c.b]; if (!a || !b) return;
    const span = Math.hypot(b.x_m - a.x_m, b.z_m - a.z_m);
    const mat = connMat(c.material);
    // c.height_m = barens ØVERSTE kant → centrum ligger en halv tykkelse lavere
    const barHalf = (mat.kind === 'wood' ? (mat.side || 100) : (mat.od || 33)) / 2000;
    const yBar = c.height_m - barHalf;
    const A = V3(a.x_m - cx, yBar, a.z_m - cz);
    const B = V3(b.x_m - cx, yBar, b.z_m - cz);
    const eff = effSpan(c, span);   // stige aflaster baren (ekstra støttepunkt)
    const crit = eff > 0 && beam(eff, mat, 1, 0.25).pYield < refLoad;
    const baseMat = crit ? critMat : (mat.kind === 'wood' ? woodMat : pipeMat);
    if (mat.kind === 'wood') {
      const sd = (mat.side || 100) / 1000;
      const dir = new THREE.Vector3().subVectors(B, A); const len = dir.length();
      const m = new THREE.Mesh(new THREE.BoxGeometry(sd, sd, len), baseMat);
      m.position.copy(A).addScaledVector(dir, 0.5);
      m.quaternion.setFromUnitVectors(V3(0, 0, 1), dir.clone().normalize());
      m.castShadow = true; group.add(m);
    } else {
      const r = (mat.od || 33) / 2000;
      group.add(cylBetween(A, B, r, baseMat));
      // Kee-beslag i begge ender (mod stolperne)
      [[A, B], [B, A]].forEach(([end, other]) => {
        const f = makeFitting(r);
        const toMid = new THREE.Vector3().subVectors(other, end).setY(0).normalize();
        f.position.set(end.x + toMid.x * POST / 2, yBar, end.z + toMid.z * POST / 2);
        f.quaternion.setFromUnitVectors(V3(1, 0, 0), toMid);
        group.add(f);
      });
    }
    // svævende højde-label ved baren
    const out = new THREE.Vector3((A.x + B.x) / 2, 0, (A.z + B.z) / 2);
    if (out.length() > 1e-3) out.normalize(); else out.set(0, 0, 1);
    const hl = makeLabel(fmtH(c.height_m));
    hl.position.set((A.x + B.x) / 2 + out.x * 0.3, c.height_m + 0.16, (A.z + B.z) / 2 + out.z * 0.3);
    group.add(hl);
    // fast forbindelses-label på jorden (blå, par-navn). Statisk og vendt
    // UDAD som stolpe-labels (samme helper), så den læses fra kameraet.
    const fl = makeFlatLabel(connLabel(c), '#0b66c3', '#0b3a66', { shape: 'pill' });
    fl.position.set((A.x + B.x) / 2, 0.02, (A.z + B.z) / 2);
    fl.rotation.y = outwardLabelYawFor(out.x, out.z);
    group.add(fl);
  });

  // ---- stiger: LODRET rør + vandrette trin, bundet til en vandret bar ----
  // Bar-valg og effektiv spændvidde deles med Kort/Materialer/Print (model.js).
  // SKAL være function-deklarationer (hoistes): effSpan bruges af
  // forbindelses-løkken længere oppe, før dette punkt i koden.
  function ladderBar(at) { return ladderBarOf(design, at); }
  function effSpan(c) { return effSpanOfConn(design, c); }

  for (const at of design.attachments) {
    if (at.type !== 'ladder') continue;
    const p = byId[at.postId]; if (!p) continue;
    const X = p.x_m - cx, Z = p.z_m - cz;
    const bar = ladderBar(at);
    const dx = bar ? bar.dx : 0, dz = bar ? bar.dz : 1;
    const barY = bar ? bar.height : (design.site.connHeight_m || 2.2);
    const inset = Math.max(0.05, at.width_m || 0.5);           // afstand stolpe → lodret rør
    const rLad = (33.7 / 1000) / 2;            // 1" stigerør
    const vBot = -0.5;                         // nedstøbt ½ m
    const vx = X + dx * inset, vz = Z + dz * inset;

    // betonfod + småsten til det lodrette rør
    const foot = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.5 - GRAVEL_H, 0.22), concMat);
    foot.position.set(vx, -0.25 + GRAVEL_H / 2, vz); group.add(foot);
    const footG = new THREE.Mesh(new THREE.BoxGeometry(0.22, GRAVEL_H, 0.22), gravelMat);
    footG.position.set(vx, -0.5 + GRAVEL_H / 2, vz); group.add(footG);

    // lodret rør op til baren
    group.add(cylBetween(V3(vx, vBot, vz), V3(vx, barY, vz), rLad, pipeMat));
    // quick-fitting hvor det lodrette rør møder baren
    const qf = makeClamp(rLad); qf.position.set(vx, barY, vz); group.add(qf);

    // trin hver 40 cm
    for (let y = 0.4; y <= barY - 0.25; y += 0.4) {
      const px = X + dx * POST / 2, pz = Z + dz * POST / 2;
      group.add(cylBetween(V3(px, y, pz), V3(vx, y, vz), rLad, pipeMat));
      const fp = makeFitting(rLad); fp.position.set(px, y, pz);
      fp.quaternion.setFromUnitVectors(V3(1, 0, 0), V3(dx, 0, dz)); group.add(fp);
      const cv = makeClamp(rLad); cv.position.set(vx, y, vz); group.add(cv);
    }
  }

  // ---- armgange (monkey bars): 1"-trin hængt under to parallelle barer ----
  for (const at of design.attachments) {
    if (at.type !== 'monkey') continue;
    const g = monkeyGeometry(design, at.connA, at.connB, at.spacing_m);
    if (!g || !g.rungs.length) continue;
    const rRung = (33.7 / 1000) / 2;                          // 1" rør
    const diaOf = c => { const m = connMat(c.material); return (m.kind === 'wood' ? (m.side || 100) : (m.od || 33)) / 1000; };
    // trin-centrum lige under UNDERKANTEN af den laveste bar (barens top = height_m)
    const y = Math.min(g.ca.height_m - diaOf(g.ca), g.cb.height_m - diaOf(g.cb)) - rRung;
    for (const r of g.rungs) {
      group.add(cylBetween(V3(r.ax - cx, y, r.az - cz), V3(r.bx - cx, y, r.bz - cz), rRung, pipeMat));
      // klemme-beslag i hver ende (mod de to barer)
      const c1 = makeClamp(rRung); c1.position.set(r.ax - cx, y, r.az - cz); group.add(c1);
      const c2 = makeClamp(rRung); c2.position.set(r.bx - cx, y, r.bz - cz); group.add(c2);
    }
  }

  // ---- avatarer: person med STRAKTE arme (skala = personhøjde) ----
  const skinMat = new THREE.MeshStandardMaterial({ color: 0xd9a679, roughness: 0.8 });
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x5b6b8c, roughness: 0.75 });
  for (const at of design.attachments) {
    if (at.type !== 'avatar') continue;
    const X = at.x_m - cx, Z = at.z_m - cz;
    const Hh = Math.max(0.3, at.height_m || 1.8);   // standhøjde til issen
    const limb = Hh * 0.045, sw = Hh * 0.11;        // lem-radius + halv skulderbredde
    const av = new THREE.Group();
    // ben
    [-1, 1].forEach(s => { av.add(cylBetween(V3(s * sw * 0.55, 0, 0), V3(s * sw * 0.5, Hh * 0.47, 0), limb * 1.05, bodyMat)); });
    // krop
    const torso = new THREE.Mesh(new THREE.CylinderGeometry(sw * 0.78, sw * 0.62, Hh * 0.33, 14), bodyMat);
    torso.position.set(0, Hh * 0.635, 0); torso.castShadow = true; av.add(torso);
    // hoved
    const head = new THREE.Mesh(new THREE.SphereGeometry(Hh * 0.07, 16, 12), skinMat);
    head.position.set(0, Hh * 0.93, 0); head.castShadow = true; av.add(head);
    // arme STRAKT op fra skuldrene
    const shY = Hh * 0.80, tipY = Hh * 1.25;        // rækkehøjde ≈ 1,25 × person
    [-1, 1].forEach(s => {
      av.add(cylBetween(V3(s * sw, shY, 0), V3(s * sw * 0.7, tipY, 0), limb, skinMat));
      const hand = new THREE.Mesh(new THREE.SphereGeometry(limb * 1.3, 10, 8), skinMat);
      hand.position.set(s * sw * 0.7, tipY, 0); av.add(hand);
    });
    av.position.set(X, 0, Z);
    group.add(av);
  }

  // ---- halvgennemsigtig jord + gitter (så fundamentet ses) ----
  const gsize = Math.max(8, maxR * 2.8);
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(gsize, gsize),
    new THREE.MeshStandardMaterial({ color: 0x9fb18f, roughness: 1, transparent: true, opacity: 0.68, depthWrite: false }));
  ground.rotation.x = -Math.PI / 2; ground.receiveShadow = true; scene.add(ground);
  const grid = new THREE.GridHelper(gsize, Math.round(gsize), 0x7a8a72, 0x88977f);
  grid.position.y = 0.001; scene.add(grid);

  // ---- bane-styret kamera (rotér / zoom / panorér) ----
  const target = V3(0, maxAbove * 0.45, 0);
  const orbit = { r: Math.max(maxR * 2.4, maxAbove * 1.9, 4), theta: Math.PI * 0.25, phi: Math.PI * 0.36 };
  function applyCam() {
    const sp = Math.sin(orbit.phi);
    camera.position.set(
      target.x + orbit.r * sp * Math.sin(orbit.theta),
      target.y + orbit.r * Math.cos(orbit.phi),
      target.z + orbit.r * sp * Math.cos(orbit.theta));
    camera.lookAt(target);
  }
  applyCam();

  const cvs = renderer.domElement;
  cvs.style.cursor = 'grab';
  cvs.style.touchAction = 'none';
  let dirty = true;                 // scenen er statisk — render kun ved ændringer
  const invalidate = () => { dirty = true; };
  const clampR = r => Math.min(maxR * 8 + 20, Math.max(1.2, r));
  let drag = null;
  const touch3d = new Map();        // aktive fingre (pinch-zoom med to fingre)
  cvs.addEventListener('pointerdown', e => {
    if (e.pointerType === 'touch') {
      touch3d.set(e.pointerId, [e.clientX, e.clientY]);
      if (touch3d.size === 2) {
        const [p1, p2] = [...touch3d.values()];
        drag = { pinch: true, d0: Math.hypot(p1[0] - p2[0], p1[1] - p2[1]) || 1, r0: orbit.r };
        try { cvs.setPointerCapture(e.pointerId); } catch (_) {}
        return;
      }
    }
    drag = { x: e.clientX, y: e.clientY, pan: e.button === 2 || e.shiftKey };
    cvs.style.cursor = 'grabbing';
    try { cvs.setPointerCapture(e.pointerId); } catch (_) {}
  });
  cvs.addEventListener('pointermove', e => {
    if (e.pointerType === 'touch' && touch3d.has(e.pointerId)) touch3d.set(e.pointerId, [e.clientX, e.clientY]);
    if (!drag) return;
    if (drag.pinch) {
      if (touch3d.size < 2) return;
      const [p1, p2] = [...touch3d.values()];
      const d = Math.hypot(p1[0] - p2[0], p1[1] - p2[1]) || 1;
      orbit.r = clampR(drag.r0 * drag.d0 / d);
      applyCam(); invalidate();
      return;
    }
    const dx = e.clientX - drag.x, dy = e.clientY - drag.y; drag.x = e.clientX; drag.y = e.clientY;
    if (drag.pan) {
      const right = V3().subVectors(camera.position, target); right.y = 0; right.normalize();
      const side = V3(-right.z, 0, right.x);
      const k = orbit.r * 0.0016;
      target.addScaledVector(side, -dx * k); target.y = Math.max(0, target.y + dy * k);
    } else {
      orbit.theta -= dx * 0.01;
      orbit.phi = Math.min(Math.PI * 0.49, Math.max(0.08, orbit.phi - dy * 0.01));
    }
    applyCam(); invalidate();
  });
  const endDrag = e => {
    if (e && e.pointerType === 'touch') touch3d.delete(e.pointerId);
    if (drag && drag.pinch && touch3d.size >= 2) return;   // stadig to fingre nede
    drag = null; cvs.style.cursor = 'grab';
  };
  cvs.addEventListener('pointerup', endDrag);
  cvs.addEventListener('pointercancel', endDrag);
  cvs.addEventListener('contextmenu', e => e.preventDefault());
  cvs.addEventListener('wheel', e => {
    e.preventDefault();
    orbit.r = clampR(orbit.r * (e.deltaY < 0 ? 1 / 1.1 : 1.1));
    applyCam(); invalidate();
  }, { passive: false });

  // ---- render-loop: kun ved ændringer; rydder GPU-ressourcer når fanen forlades ----
  let lastW = 0, lastH = 0;
  function disposeAll() {
    scene.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      const mats = Array.isArray(o.material) ? o.material : (o.material ? [o.material] : []);
      mats.forEach(m => { if (m.map) m.map.dispose(); m.dispose(); });
    });
    renderer.dispose();
  }
  function frame() {
    if (!host.isConnected) { disposeAll(); return; }
    const w = host.clientWidth || 1, h = host.clientHeight || Math.round(w * 0.62);
    if (w !== lastW || h !== lastH) {
      lastW = w; lastH = h;
      renderer.setSize(w, h, false);
      camera.aspect = w / h; camera.updateProjectionMatrix();
      dirty = true;
    }
    if (dirty) { dirty = false; renderer.render(scene, camera); }
    requestAnimationFrame(frame);
  }
  frame();
}

// ===== src/ui/tabMaterials.js =====
// Fane: Materialer. Viser indkøbs-/materialelisten og skærelisten fra
// computeMaterials() i kernen (src/core/materials.js) — ren visning her.

const tabMaterials = {
  id: 'materials',
  labelKey: 'tab.materials',
  render(container, ctx) {
    const { design, store } = ctx;
    const lang = ctx.lang;
    const tt = k => ctx.t(k, lang);
    // længder vises i kortets valgte enhed (m eller fod), som på Kort-fanen
    const su = (design.units.site && design.units.site.len) || 'm';
    const suTxt = su === 'ft' ? tt('unit.ft') : tt('unit.m');
    const fm = v => `${fmt(lenFromSI(v, su), 2, lang)} ${suTxt}`;

    container.append(el('h2', {}, tt('tab.materials')), el('p', { class: 'intro' }, tt('mats.intro')));
    if (!design.posts.length) {
      container.append(el('div', { class: 'empty-state empty-mats' },
        el('div', { class: 'material-ghost', 'aria-hidden': 'true' },
          el('span', { class: 'mat-stack mat-stack-a' }),
          el('span', { class: 'mat-stack mat-stack-b' }),
          el('span', { class: 'mat-stack mat-stack-c' }),
          el('span', { class: 'mat-bag' }),
          el('span', { class: 'mat-crate' })),
        el('p', {}, tt('mats.empty')),
        el('button', { class: 'btn-sm primary', type: 'button', onclick: () => ctx.openTab && ctx.openTab('site') }, tt('tab.site'))));
      return;
    }

    const M = computeMaterials(design);

    // ---- materialeliste (tabel) ----
    const rows = [];
    rows.push({ l: `${M.postMat.name} (${tt('mats.posts')})`, q: `${M.postCount} ${tt('mats.pcs')} · ${fm(M.postTotalLen)} ${tt('mats.total')}`, c: materialColor(M.postMat) });
    rows.push({ l: `${tt('mats.incl')} ${fm(M.buriedTotal)} ${tt('mats.buried')}`, q: '', sub: true });
    for (const id of Object.keys(M.barGroups)) {
      const g = M.barGroups[id];
      const kind = g.mat.kind === 'wood' ? tt('mat.kind.wood') : tt('mat.kind.pipe');
      rows.push({ l: `${g.mat.name} — ${kind}`, q: `${g.count} ${tt('mats.pcs')} · ${fm(g.totalLen)} ${tt('mats.total')}`, c: materialColor(g.mat) });
    }
    if (M.pipeConnCount > 0) rows.push({ l: tt('mats.fittings'), q: `${M.pipeConnCount * 2} ${tt('mats.pcs')}` });
    if (M.ladderCount > 0) {
      rows.push({ l: tt('mats.ladderVert'), q: fm(M.ladVert) });
      rows.push({ l: `${tt('mats.ladderRungs')} (${M.ladRungCount} ${tt('mats.pcs')})`, q: fm(M.ladRungLen) });
      rows.push({ l: tt('mats.ladderKee'), q: `${M.ladKee} ${tt('mats.pcs')}` });
    }
    if (M.monkeyCount > 0) {
      rows.push({ l: `${tt('mats.monkeyRungs')} (${M.monRungCount} ${tt('mats.pcs')})`, q: fm(M.monRungLen) });
      if (M.monKee > 0) rows.push({ l: tt('mats.monkeyKee'), q: `${M.monKee} ${tt('mats.pcs')}` });
      if (M.monSwivel > 0) rows.push({ l: tt('mats.monkeySwivel'), q: `${M.monSwivel} ${tt('mats.pcs')}` });
    }
    rows.push({ l: tt('mats.screws'), q: `~${32 + (M.ladRungCount + M.monRungCount) * 4} ${tt('mats.pcs')}` });
    rows.push({ l: tt('mats.gravel'), q: `${Math.round(M.gravelVol * 1000)} L` });
    rows.push({ l: tt('mats.concrete'), q: `${fmt(M.concVol, 2, lang)} m³` });
    rows.push({ l: tt('mats.bags'), q: `~${M.bags25}`, sub: true });
    rows.push({ l: tt('mats.tar'), q: `~${fmt(M.tarLitre, 1, lang)} L` });

    const tbl = el('table', { class: 'mat-list' },
      el('tbody', {}, ...rows.map(r => el('tr', { class: r.sub ? 'sub' : null },
        el('td', {}, r.c ? el('span', { class: 'mat-dot', style: `background:${r.c}` }) : null, r.l),
        el('td', { class: 'q' }, r.q)))));
    container.append(el('h3', {}, tt('mats.tableTitle')), tbl);
    container.append(el('p', { class: 'mat-note' },
      `${tt('mats.assume1')} ${Math.round(M.hole * 100)}×${Math.round(M.hole * 100)} cm, ${Math.round(GRAVEL_H * 100)} cm ${tt('mats.gravelShort')}. ${tt('mats.assume2')}`));

    // ---- skæreliste (rør/træ pakket i hele stænger; købslængde pr. materiale) ----
    container.append(el('h3', { class: 'cut-h' }, tt('mats.cutTitle')));
    const cutHost = el('div', { class: 'cutlist' });
    const ids = Object.keys(M.cut).sort();
    const counts = {};
    const footNote = el('p', { class: 'mat-note' });
    const updateFoot = () => {
      const total = Object.values(counts).reduce((s, n) => s + n, 0);
      footNote.textContent = `${tt('mats.cutTotal1')} ${total} ${tt('mats.cutTotal2')} ${KERF * 1000} mm ${tt('mats.cutTotal3')}`;
    };

    for (const id of ids) {
      const grp = M.cut[id];
      const matCol = materialColor(grp.mat);
      const shades = segShades(grp.mat);

      // pr. materiale: redigerbar købslængde (gemmes i design.stock[matId] i meter,
      // vises/redigeres i kortets enhed) — opdateres på stedet
      const stockInp = el('input', { type: 'number', step: '0.5', min: String(round(lenFromSI(0.5, su))), class: 'cl-stock-inp' });
      const titleB = el('b', {}, el('span', { class: 'cl-dot', style: `background:${matCol}` }), el('span', { class: 'cl-name' }));
      const body = el('div', { class: 'cl-body' });
      const warnHost = el('div', {});
      const grpEl = el('div', { class: 'cl-grp', style: `border-left-color:${matCol}` },
        el('div', { class: 'cl-grp-h' }, titleB,
          el('label', { class: 'cl-stock' }, `${tt('mats.stockLen')} (${suTxt})`, stockInp)));
      grpEl.append(body, warnHost);

      const refresh = () => {
        const stockLen = (design.stock && design.stock[id]) || (grp.mat.kind === 'wood' ? 4.8 : STOCK);
        stockInp.value = String(round(lenFromSI(stockLen, su)));
        const { bars, count } = packPieces(grp.pieces, stockLen, KERF);
        counts[id] = count;
        const oversize = grp.pieces.some(p => p.len > stockLen + 1e-9);
        titleB.querySelector('.cl-name').textContent = ` ${grp.mat.name}: ${count} × ${fm(stockLen)}`;
        clear(body);
        bars.forEach(b => {
          const barEl = el('div', { class: 'cl-bar' });
          b.pieces.forEach((p, pi) => {
            barEl.append(el('span', { class: 'cl-seg', title: `${p.label}: ${fm(p.len)}`,
              style: `width:${Math.min(100, p.len / stockLen * 100).toFixed(2)}%;background:${shades[pi % shades.length]}` },
              el('span', { class: 'cl-seg-lbl' }, p.label), fmt(lenFromSI(p.len, su), 2, lang)));
          });
          if (b.waste > 0.01) barEl.append(el('span', { class: 'cl-waste', title: `${tt('mats.waste')} ${fm(b.waste)}`,
            style: `width:${(b.waste / stockLen * 100).toFixed(2)}%` }, fmt(lenFromSI(b.waste, su), 2, lang)));
          body.append(barEl);
          const list = b.pieces.map(p => `${p.label} ${fmt(lenFromSI(p.len, su), 2, lang)}`).join('  ·  ');
          body.append(el('div', { class: 'cl-list' }, `${list}${b.waste > 0.01 ? `  ·  ${tt('mats.waste')} ${fm(b.waste)}` : ''}`));
        });
        clear(warnHost);
        if (oversize) warnHost.append(el('div', { class: 'cl-warn' }, tt('mats.tooLong')));
        updateFoot();
      };
      stockInp.addEventListener('input', () => {
        const v = parseFloat(stockInp.value);
        if (!isNaN(v)) { store.update(d => { d.stock = d.stock || {}; d.stock[id] = Math.max(lenToSI(v, su), 0.5); }); refresh(); }
      });
      stockInp.addEventListener('change', () => { stockInp.value = String(Math.max(parseFloat(stockInp.value) || 0, round(lenFromSI(0.5, su)))); });
      refresh();
      cutHost.append(grpEl);
    }
    if (!Object.keys(M.cut).length) cutHost.append(el('div', { class: 'sel-hint' }, tt('mats.noPipes')));
    container.append(cutHost);
    container.append(footNote);
  },
};

// ===== src/ui/print.js =====
// Print: samlet byggevejledning — tegning, stolpe-/forbindelsestabeller,
// materialeliste, skæreliste og støbe-trin i ét printvenligt dokument.
// Bygger et skjult #print-root og kalder window.print(); @media print-CSS'en
// gemmer appen og viser kun vejledningen.

// Lille selvstændig SVG-gengivelse af tegningen (sort/hvid-venlig, med mål).
function printMapSvg(design) {
  if (!design.posts.length) return '';
  const su = (design.units.site && design.units.site.len) || 'm';
  const xs = design.posts.map(p => p.x_m), zs = design.posts.map(p => p.z_m);
  const pad = 0.8;
  const minX = Math.min(...xs) - pad, maxX = Math.max(...xs) + pad;
  const minZ = Math.min(...zs) - pad, maxZ = Math.max(...zs) + pad;
  const Wp = 700, Hp = Math.max(240, Math.min(520, Wp * (maxZ - minZ) / (maxX - minX)));
  const k = Math.min(Wp / (maxX - minX), Hp / (maxZ - minZ));
  const sx = x => (x - minX) * k + (Wp - (maxX - minX) * k) / 2;
  const sy = z => (z - minZ) * k + (Hp - (maxZ - minZ) * k) / 2;
  const byId = Object.fromEntries(design.posts.map(p => [p.id, p]));
  const connMat = ref => connMatOf(design, ref);
  const postLetter = id => postLetterOf(design, id);
  let svg = '';
  design.connections.forEach(c => {
    const a = byId[c.a], b = byId[c.b]; if (!a || !b) return;
    const mat = connMat(c.material);
    const dimMm = mat.kind === 'wood' ? mat.side : mat.od;
    const span = Math.hypot(b.x_m - a.x_m, b.z_m - a.z_m);
    const x1 = sx(a.x_m), y1 = sy(a.z_m), x2 = sx(b.x_m), y2 = sy(b.z_m);
    svg += `<line x1="${x1.toFixed(1)}" y1="${y1.toFixed(1)}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="${materialColor(mat)}" stroke-width="${Math.max(2, Math.min(10, dimMm / 12))}" stroke-linecap="round"/>`;
    // navn + længde midt på baren (drejet så det kan læses)
    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    let deg = Math.atan2(y2 - y1, x2 - x1) * 180 / Math.PI;
    if (deg > 90) deg -= 180; if (deg < -90) deg += 180;
    const lbl = `${[postLetter(c.a), postLetter(c.b)].sort().join('–')}: ${lenFromSI(span, su).toFixed(2)} ${su === 'ft' ? 'ft' : 'm'}`;
    svg += `<g transform="translate(${mx.toFixed(1)} ${my.toFixed(1)}) rotate(${deg.toFixed(1)})"><rect x="${-lbl.length * 3.3 - 3}" y="-19" width="${lbl.length * 6.6 + 6}" height="14" rx="3" fill="#fff" opacity="0.85"/><text x="0" y="-8" text-anchor="middle" font-size="11" font-weight="600" fill="#111">${lbl}</text></g>`;
  });
  // armgange: trin som tynde streger + M-label i midten (matcher Kort-fanen)
  design.attachments.forEach(at => {
    if (at.type !== 'monkey') return;
    const g = monkeyGeometry(design, at.connA, at.connB, at.spacing_m);
    if (!g) return;
    g.rungs.forEach(r => {
      svg += `<line x1="${sx(r.ax).toFixed(1)}" y1="${sy(r.az).toFixed(1)}" x2="${sx(r.bx).toFixed(1)}" y2="${sy(r.bz).toFixed(1)}" stroke="#0e7490" stroke-width="1.6"/>`;
    });
    const lbl = monkeyLabelOf(design, at);
    svg += `<circle cx="${sx(g.mid.x).toFixed(1)}" cy="${sy(g.mid.z).toFixed(1)}" r="9" fill="#fff" stroke="#0e7490"/><text x="${sx(g.mid.x).toFixed(1)}" y="${(sy(g.mid.z) + 4).toFixed(1)}" text-anchor="middle" font-size="11" font-weight="800" fill="#0e7490">${lbl}</text>`;
  });
  // stiger: markering + S-label ved stolpen
  design.attachments.forEach(at => {
    if (at.type !== 'ladder') return;
    const p = byId[at.postId]; if (!p) return;
    svg += `<text x="${(sx(p.x_m) + 10).toFixed(1)}" y="${(sy(p.z_m) - 10).toFixed(1)}" font-size="13">🪜</text>`;
    svg += `<text x="${(sx(p.x_m) + 28).toFixed(1)}" y="${(sy(p.z_m) - 12).toFixed(1)}" font-size="11" font-weight="800" fill="#0e7490">${ladderLabelOf(design, at)}</text>`;
  });
  // stolper + bogstaver
  const side = Math.max(8, 0.125 * k);
  design.posts.forEach((p, i) => {
    const x = sx(p.x_m), y = sy(p.z_m);
    svg += `<rect x="${(x - side / 2).toFixed(1)}" y="${(y - side / 2).toFixed(1)}" width="${side.toFixed(1)}" height="${side.toFixed(1)}" rx="2" fill="#b6986a" stroke="#5b431f"/>`;
    svg += `<circle cx="${(x + side).toFixed(1)}" cy="${(y - side).toFixed(1)}" r="9" fill="#fff" stroke="#b45309"/><text x="${(x + side).toFixed(1)}" y="${(y - side + 4).toFixed(1)}" text-anchor="middle" font-size="12" font-weight="800" fill="#9a3412">${letterFor(i)}</text>`;
  });
  // målestok: 1 m (metrisk) / 3 fod (imperial) — samme princip som Kort-fanen
  const scM = su === 'ft' ? 3 * 0.3048 : 1, scLbl = su === 'ft' ? '3 ft' : '1 m', scPx = scM * k;
  svg += `<g><line x1="16" y1="${Hp - 14}" x2="${16 + scPx}" y2="${Hp - 14}" stroke="#111" stroke-width="2"/><line x1="16" y1="${Hp - 19}" x2="16" y2="${Hp - 9}" stroke="#111" stroke-width="2"/><line x1="${16 + scPx}" y1="${Hp - 19}" x2="${16 + scPx}" y2="${Hp - 9}" stroke="#111" stroke-width="2"/><text x="${16 + scPx / 2}" y="${Hp - 20}" text-anchor="middle" font-size="11" fill="#111">${scLbl}</text></g>`;
  return `<svg viewBox="0 0 ${Wp} ${Hp}" width="100%" xmlns="http://www.w3.org/2000/svg" style="background:#fff;border:1px solid #999;border-radius:4px">${svg}</svg>`;
}

function printGuide(ctx) {
  // Hent designet fra store'en — ctx.design kan være et løsrevet (stale)
  // objekt efter fortryd/gentag, der erstatter selve design-objektet.
  const design = ctx.store.getDesign(), lang = ctx.lang;
  const tt = k => ctx.t(k, lang);
  if (!design.posts.length) { alert(tt('mats.empty')); return; }
  const M = computeMaterials(design);
  // længder i kortets valgte enhed (som på Kort/Materialer)
  const su = (design.units.site && design.units.site.len) || 'm';
  const suTxt = su === 'ft' ? tt('unit.ft') : tt('unit.m');
  const fm = v => `${fmt(lenFromSI(v, su), 2, lang)} ${suTxt}`;

  const old = document.getElementById('print-root');
  if (old) old.remove();
  const root = el('div', { id: 'print-root' });

  // ---- sidehoved ----
  root.append(
    el('h1', {}, design.meta.name || tt('app.title')),
    el('p', { class: 'pr-sub' }, `${tt('app.title')} — ${tt('print.subtitle')} · ${tt('print.date')}: ${new Date().toLocaleDateString()}`));

  // ---- tegning ----
  root.append(el('h2', {}, tt('print.mapTitle')), el('div', { html: printMapSvg(design) }));

  // ---- stolpetabel ----
  const postHeightOf = p => postHeightOfD(design, p);
  const postDepthOf = p => postDepthOfD(design, p);
  const postHoleOf = p => postHoleMmOf(design, p);
  root.append(el('h2', {}, tt('print.postsTitle')),
    el('table', { class: 'pr-tab' },
      el('thead', {}, el('tr', {},
        el('th', {}, tt('print.th.post')), el('th', {}, tt('print.th.height')),
        el('th', {}, tt('print.th.depth')), el('th', {}, tt('print.th.hole')))),
      el('tbody', {}, ...design.posts.map((p, i) => el('tr', {},
        el('td', {}, letterFor(i)), el('td', {}, fm(postHeightOf(p))),
        el('td', {}, fm(postDepthOf(p))), el('td', {}, `${Math.round(postHoleOf(p) / 10)} × ${Math.round(postHoleOf(p) / 10)} cm`))))));

  // ---- forbindelsestabel ----
  const byId = Object.fromEntries(design.posts.map(p => [p.id, p]));
  const connMat = ref => connMatOf(design, ref);
  const postLetter = id => postLetterOf(design, id);
  root.append(el('h2', {}, tt('print.connsTitle')),
    el('table', { class: 'pr-tab' },
      el('thead', {}, el('tr', {},
        el('th', {}, tt('print.th.conn')), el('th', {}, tt('print.th.mat')),
        el('th', {}, tt('print.th.connheight')), el('th', {}, tt('print.th.span')))),
      el('tbody', {}, ...design.connections.map(c => {
        const a = byId[c.a], b = byId[c.b];
        const span = (a && b) ? Math.hypot(b.x_m - a.x_m, b.z_m - a.z_m) : 0;
        return el('tr', {},
          el('td', {}, [postLetter(c.a), postLetter(c.b)].sort().join('–')),
          el('td', {}, connMat(c.material).name),
          el('td', {}, fm(c.height_m)), el('td', {}, fm(span)));
      }))));

  // ---- materialeliste (samme tal som Materialer-fanen) ----
  const rows = [];
  rows.push([`${M.postMat.name} (${tt('mats.posts')})`, `${M.postCount} ${tt('mats.pcs')} · ${fm(M.postTotalLen)} ${tt('mats.total')}`]);
  for (const id of Object.keys(M.barGroups)) {
    const g = M.barGroups[id];
    rows.push([g.mat.name, `${g.count} ${tt('mats.pcs')} · ${fm(g.totalLen)} ${tt('mats.total')}`]);
  }
  if (M.pipeConnCount > 0) rows.push([tt('mats.fittings'), `${M.pipeConnCount * 2} ${tt('mats.pcs')}`]);
  if (M.ladderCount > 0) {
    rows.push([tt('mats.ladderVert'), fm(M.ladVert)]);
    rows.push([`${tt('mats.ladderRungs')} (${M.ladRungCount} ${tt('mats.pcs')})`, fm(M.ladRungLen)]);
    rows.push([tt('mats.ladderKee'), `${M.ladKee} ${tt('mats.pcs')}`]);
  }
  if (M.monkeyCount > 0) {
    rows.push([`${tt('mats.monkeyRungs')} (${M.monRungCount} ${tt('mats.pcs')})`, fm(M.monRungLen)]);
    if (M.monKee > 0) rows.push([tt('mats.monkeyKee'), `${M.monKee} ${tt('mats.pcs')}`]);
    if (M.monSwivel > 0) rows.push([tt('mats.monkeySwivel'), `${M.monSwivel} ${tt('mats.pcs')}`]);
  }
  rows.push([tt('mats.screws'), `~${32 + (M.ladRungCount + M.monRungCount) * 4} ${tt('mats.pcs')}`]);
  rows.push([tt('mats.gravel'), `${Math.round(M.gravelVol * 1000)} L`]);
  rows.push([`${tt('mats.concrete')} (${tt('mats.bags')})`, `${fmt(M.concVol, 2, lang)} m³ (~${M.bags25})`]);
  rows.push([tt('mats.tar'), `~${fmt(M.tarLitre, 1, lang)} L`]);
  root.append(el('h2', {}, tt('mats.tableTitle')),
    el('table', { class: 'pr-tab' }, el('tbody', {}, ...rows.map(r =>
      el('tr', {}, el('td', {}, r[0]), el('td', { class: 'pr-q' }, r[1]))))));

  // ---- skæreliste (tekstform pr. materiale) ----
  root.append(el('h2', {}, tt('mats.cutTitle')));
  for (const id of Object.keys(M.cut).sort()) {
    const grp = M.cut[id];
    const stockLen = (design.stock && design.stock[id]) || (grp.mat.kind === 'wood' ? 4.8 : STOCK);
    const { bars, count } = packPieces(grp.pieces, stockLen, KERF);
    root.append(el('p', { class: 'pr-cut-h' }, `${grp.mat.name}: ${count} × ${fm(stockLen)} (${tt('mats.stockLen').toLowerCase()})`));
    const ul = el('ul', { class: 'pr-cut' });
    bars.forEach((b, bi) => {
      const list = b.pieces.map(p => `${p.label} ${fmt(p.len, 2, lang)}`).join(' · ');
      ul.append(el('li', {}, `#${bi + 1}: ${list}${b.waste > 0.01 ? ` · ${tt('mats.waste')} ${fm(b.waste)}` : ''}`));
    });
    root.append(ul);
  }
  root.append(el('p', { class: 'pr-note' }, `${tt('mats.cutTotal3')} ${KERF * 1000} mm. ${tt('mats.assume2')}`));

  // ---- støbe-trin ----
  root.append(el('h2', {}, tt('print.how')),
    el('ol', { class: 'pr-steps' }, ...[1, 2, 3, 4, 5].map(n => el('li', {}, tt('print.step' + n)))));

  root.append(el('p', { class: 'pr-note' }, tt('disclaimer')));

  document.body.append(root);
  const cleanup = () => { root.remove(); window.removeEventListener('afterprint', cleanup); };
  window.addEventListener('afterprint', cleanup);
  window.print();
}

// ===== src/main.js =====
// App-bootstrap: bygger header (sprog), fanebjælke, indhold og footer.

// Saml store-funktionerne i ét objekt (virker både som ES-modul og i enkelt-fil-bundlen).
const store = { getDesign, commit, update, replace, undo, redo };

const TABS = [
  tabSite,
  tabView3d,
  tabMaterials,
  tabPost,
  tabBar,
];
const TAB_GROUPS = [
  { labelKey: 'nav.project', tabs: [tabSite, tabView3d, tabMaterials] },
  { labelKey: 'nav.analysis', tabs: [tabPost, tabBar] },
];

const ACTIVE_KEY = 'crd-active-tab';
let active = (() => {
  try { const s = localStorage.getItem(ACTIVE_KEY); if (s && TABS.some(t => t.id === s)) return s; } catch (_) {}
  return 'site';
})();

const lang = () => store.getDesign().settings.lang;
const ctx = () => ({ design: store.getDesign(), store, t, lang: lang(), rerender: renderActive, rerenderAll: renderAll, openTab: setActive });

function renderHeader() {
  const hd = clear(document.getElementById('hd'));
  hd.append(
    el('div', { class: 'brand' },
      el('strong', {}, t('app.title', lang()))),
    fileBar(ctx()),
    el('div', { class: 'lang' },
      el('span', { class: 'lang-l' }, t('lang.label', lang())),
      ...LANGS.map(([code, name]) =>
        el('button', {
          class: 'lang-b' + (code === lang() ? ' on' : ''),
          type: 'button',
          onclick: () => setLang(code),
        }, name))));
}

function renderTabbar() {
  const nav = clear(document.getElementById('tabbar'));
  TAB_GROUPS.forEach(group => {
    const wrap = el('div', { class: 'tab-group' + (group.labelKey ? ' tab-group-labeled' : '') });
    if (group.labelKey) wrap.append(el('span', { class: 'tab-group-label' }, t(group.labelKey, lang())));
    const rowTabs = el('div', { class: 'tab-row' });
    group.tabs.forEach(tab => rowTabs.append(
      el('button', {
        class: 'tab' + (tab.id === active ? ' on' : ''),
        type: 'button',
        onclick: () => setActive(tab.id),
      }, t(tab.labelKey, lang()))));
    wrap.append(rowTabs);
    nav.append(wrap);
  });
}

function renderActive() {
  const c = clear(document.getElementById('content'));
  const tab = TABS.find(x => x.id === active) || TABS[0];   // ukendt fane-id → fald pænt tilbage
  active = tab.id;
  c.className = 'view-' + tab.id;
  tab.render(c, ctx());
}

function renderFooter() {
  document.getElementById('ft').textContent = t('disclaimer', lang());
}

function setLang(code) {
  store.update(d => { d.settings.lang = code; });
  document.documentElement.lang = code;
  renderAll();
}

function setActive(id) {
  active = id;
  try { localStorage.setItem(ACTIVE_KEY, id); } catch (_) {}
  renderTabbar();
  renderActive();
}

function renderAll() {
  renderHeader();
  renderTabbar();
  renderActive();
  renderFooter();
}

document.documentElement.lang = lang();
renderAll();
</script>
